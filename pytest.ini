[pytest]
# Pytest configuration for production network testing lab

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Strict config (fail on unknown config options)
    --strict-config

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    property: Property-based tests (Hypothesis)
    integration: Integration tests (slow, requires containerlab)
    slow: Slow tests (> 1 minute)
    vendor_specific: Tests specific to a vendor
    srlinux: SR Linux specific tests
    arista: Arista specific tests
    sonic: SONiC specific tests
    juniper: Juniper specific tests

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
source = 
    scripts
    ansible/plugins
    ansible/filter_plugins
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
