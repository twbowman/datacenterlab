frr version 8.5
frr defaults traditional
hostname spine2
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.2/32
!
interface eth1
 description Link to leaf1 eth2
 ip address 10.2.1.0/31
!
interface eth2
 description Link to leaf2 eth2
 ip address 10.2.2.0/31
!
interface eth3
 description Link to leaf3 eth2
 ip address 10.2.3.0/31
!
interface eth4
 description Link to leaf4 eth2
 ip address 10.2.4.0/31
!
router bgp 65002
 bgp router-id 10.0.0.2
 neighbor 10.2.1.1 remote-as 65011
 neighbor 10.2.1.1 description leaf1
 neighbor 10.2.2.1 remote-as 65012
 neighbor 10.2.2.1 description leaf2
 neighbor 10.2.3.1 remote-as 65013
 neighbor 10.2.3.1 description leaf3
 neighbor 10.2.4.1 remote-as 65014
 neighbor 10.2.4.1 description leaf4
 !
 address-family ipv4 unicast
  network 10.0.0.2/32
  neighbor 10.2.1.1 activate
  neighbor 10.2.2.1 activate
  neighbor 10.2.3.1 activate
  neighbor 10.2.4.1 activate
 exit-address-family
!
line vty
!
