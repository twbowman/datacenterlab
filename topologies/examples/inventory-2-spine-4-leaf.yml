---
# Ansible inventory for 2-spine-4-leaf example topology
# Use with: ansible-playbook -i topologies/examples/inventory-2-spine-4-leaf.yml ansible/site.yml

all:
  children:
    spines:
      hosts:
        spine1:
          ansible_host: 172.20.20.10
          router_id: 10.0.0.1
          asn: 65000
          bgp_role: route_reflector
          cluster_id: 10.0.0.1
          loopback_ip: 10.0.0.1/32
          bgp_neighbors:
            - peer_address: 10.0.1.1
              peer_asn: 65000
              description: "leaf1"
            - peer_address: 10.0.1.2
              peer_asn: 65000
              description: "leaf2"
            - peer_address: 10.0.1.3
              peer_asn: 65000
              description: "leaf3"
            - peer_address: 10.0.1.4
              peer_asn: 65000
              description: "leaf4"
          interfaces:
            - name: ethernet-1/1
              ip: 10.1.1.0/31
              description: "to leaf1"
            - name: ethernet-1/2
              ip: 10.1.2.0/31
              description: "to leaf2"
            - name: ethernet-1/3
              ip: 10.1.3.0/31
              description: "to leaf3"
            - name: ethernet-1/4
              ip: 10.1.4.0/31
              description: "to leaf4"

