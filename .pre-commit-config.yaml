repos:
  # ── Stage 1: Lint ──────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        files: ^(scripts/|ansible/plugins/|ansible/filter_plugins/)
        additional_dependencies: [types-PyYAML, types-requests]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: ^scripts/

  # ── Stage 1.5: Local Security ─────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, --severity-level, medium]
        files: ^(scripts/|ansible/plugins/|ansible/filter_plugins/)
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: detect-azure-credentials
        name: detect azure credentials
        language: pygrep
        entry: '(?i)(AZURE_CLIENT_SECRET|AZURE_TENANT_ID|AZURE_STORAGE_KEY|AccountKey=|azure_storage_connection_string|DefaultEndpointsProtocol=.*AccountKey=)'
        types: [text]
        exclude: '(\.gitleaks\.toml|\.pre-commit-config\.yaml)$'

      - id: detect-gcp-credentials
        name: detect gcp credentials
        language: pygrep
        entry: '(?i)(private_key_id.*:.*["\x27][a-f0-9]{40}|"type"\s*:\s*"service_account"|GOOGLE_APPLICATION_CREDENTIALS|gcp_credentials|AIza[0-9A-Za-z_-]{35})'
        types: [text]
        exclude: '(\.gitleaks\.toml|\.pre-commit-config\.yaml)$'
