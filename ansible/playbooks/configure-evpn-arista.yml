---
# Configure EVPN/VXLAN on Arista EOS devices
# This playbook applies EVPN/VXLAN configuration to Arista leaf and spine switches

- name: Configure EVPN/VXLAN on Arista EOS Devices
  hosts: all
  gather_facts: false
  
  tasks:
    - name: Display EVPN deployment information
      debug:
        msg:
          - "Configuring EVPN/VXLAN on: {{ inventory_hostname }}"
          - "Device role: {{ device_role | default('not specified') }}"
          - "BGP role: {{ bgp_role | default('not specified') }}"
          - "EVPN enabled: {{ evpn_vxlan.enabled | default(false) }}"
      tags: always

    - name: Validate device is Arista EOS
      assert:
        that:
          - ansible_network_os is defined
          - ansible_network_os in ['arista.eos', 'eos']
        fail_msg: "This playbook is only for Arista EOS devices. Device {{ inventory_hostname }} is {{ ansible_network_os | default('unknown') }}"
        success_msg: "Device {{ inventory_hostname }} is Arista EOS"
      tags: always

    - name: Validate EVPN/VXLAN is enabled
      assert:
        that:
          - evpn_vxlan is defined
          - evpn_vxlan.bgp_evpn.enabled | default(false)
        fail_msg: |
          EVPN/VXLAN is not enabled for {{ inventory_hostname }}.
          Please set evpn_vxlan.bgp_evpn.enabled: true in group_vars or host_vars.
        success_msg: "EVPN/VXLAN is enabled for {{ inventory_hostname }}"
      tags: always

    - name: Configure EVPN/VXLAN on Arista EOS
      include_role:
        name: eos_evpn_vxlan
      tags: [evpn, vxlan, config]

    - name: Display EVPN/VXLAN configuration summary
      debug:
        msg:
          - "✓ EVPN/VXLAN configuration completed for {{ inventory_hostname }}"
          - "  - BGP EVPN address family: enabled"
          - "  - Route reflector: {{ evpn_vxlan.bgp_evpn.route_reflector | default(false) }}"
          - "  - VLAN-to-VNI mappings: {{ evpn_vxlan.vlan_vni_mappings | default([]) | length }}"
          - "  - L3 VNI instances: {{ evpn_vxlan.l3vni | default([]) | length }}"
      when: "'leaf' in inventory_hostname"
      tags: always

# Example usage:
#
# Configure EVPN on all Arista devices:
#   ansible-playbook -i inventory.yml playbooks/configure-evpn-arista.yml
#
# Configure EVPN on specific device:
#   ansible-playbook -i inventory.yml playbooks/configure-evpn-arista.yml --limit leaf1
#
# Configure EVPN on all leafs:
#   ansible-playbook -i inventory.yml playbooks/configure-evpn-arista.yml --limit leafs
#
# Configure EVPN on all spines:
#   ansible-playbook -i inventory.yml playbooks/configure-evpn-arista.yml --limit spines
