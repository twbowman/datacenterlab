---
# Interface State Validation Playbook
# Queries each inventory-defined interface individually via gNMI
# to verify oper-status is UP.
#
# Requirements: 7.4, 7.5

- name: Validate interface states
  hosts: all
  gather_facts: false
  tags:
    - interfaces

  tasks:
    - name: Validate each interface via gNMI
      gnmi_validate:
        host: "{{ ansible_host }}"
        port: "{{ gnmi_port }}"
        username: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        skip_verify: "{{ gnmi_skip_verify | default(true) }}"
        check_name: "interface_{{ item.name }}"
        path: "/interfaces/interface[name={{ item.name }}]/state"
        origin: "{{ validate_paths.interface_state.origin | default(omit) }}"
        expected:
          oper-status: "UP"
        remediation_hint: "Check cabling and admin-state for {{ item.name }}"
      register: intf_results
      loop: "{{ interfaces }}"
      tags:
        - interfaces

    - name: Collect interface validation results
      ansible.builtin.set_fact:
        intf_pass: "{{ intf_results.results | map(attribute='result') | selectattr('status', 'equalto', 'pass') | list | length }}"
        intf_total: "{{ intf_results.results | length }}"
        intf_fails: "{{ intf_results.results | map(attribute='result') | selectattr('status', 'equalto', 'fail') | map(attribute='check_name') | list }}"
      tags:
        - interfaces

    - name: Report interface validation result
      ansible.builtin.debug:
        msg: "Interface validation on {{ inventory_hostname }}: {{ intf_pass }}/{{ intf_total }} UP"
      tags:
        - interfaces

    - name: Assert all interfaces are operational
      ansible.builtin.assert:
        that:
          - intf_pass == intf_total
        fail_msg: "Interface validation FAILED on {{ inventory_hostname }}. {{ intf_pass }}/{{ intf_total }} UP. Failed: {{ intf_fails | join(', ') }}"
        success_msg: "All {{ intf_total }} interfaces operational on {{ inventory_hostname }}"
      tags:
        - interfaces
