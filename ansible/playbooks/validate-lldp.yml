---
# LLDP Neighbor Validation Playbook
# Uses gnmi_validate module with OpenConfig LLDP path to verify
# LLDP neighbors are present on network-facing interfaces.
#
# Requirements: 7.3, 7.5
# Inventory variables used: interfaces, validate_paths.lldp_neighbors

- name: Validate LLDP neighbors
  hosts: all
  gather_facts: false
  tags:
    - lldp

  tasks:
    - name: Count expected network-facing interfaces
      ansible.builtin.set_fact:
        expected_lldp_count: "{{ interfaces | selectattr('ip', 'defined') | list | length }}"
      tags:
        - lldp

    - name: Query LLDP neighbor state via gNMI
      gnmi_validate:
        host: "{{ ansible_host }}"
        port: "{{ gnmi_port }}"
        username: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        skip_verify: "{{ gnmi_skip_verify | default(true) }}"
        check_name: "lldp_neighbors"
        path: "{{ validate_paths.lldp_neighbors.path }}"
        origin: "{{ validate_paths.lldp_neighbors.origin | default(omit) }}"
        expected:
          system-name: "LLDP_CHECK"
        remediation_hint: "{{ validate_paths.lldp_neighbors.remediation_hint | default('Verify LLDP is enabled and check physical connectivity') }}"
      register: lldp_result
      ignore_errors: true
      tags:
        - lldp

    - name: Check LLDP data was retrieved
      ansible.builtin.set_fact:
        lldp_has_data: "{{ lldp_result.result.actual | default({}) | length > 0 }}"
      tags:
        - lldp

    - name: Report LLDP validation result
      ansible.builtin.debug:
        msg: >-
          LLDP validation on {{ inventory_hostname }}:
          data retrieved={{ lldp_has_data }},
          expected network interfaces={{ expected_lldp_count }}
      tags:
        - lldp

    - name: Assert LLDP data is present
      ansible.builtin.assert:
        that:
          - lldp_has_data | bool
        fail_msg: >-
          LLDP validation FAILED on {{ inventory_hostname }}.
          No LLDP neighbor data retrieved.
          {{ validate_paths.lldp_neighbors.remediation_hint | default('Verify LLDP is enabled and check physical connectivity') }}
        success_msg: "LLDP neighbors detected on {{ inventory_hostname }}"
      tags:
        - lldp
