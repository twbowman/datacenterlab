---
# tasks file for srlinux_ospf
# Production datacenter OSPF underlay configuration:
# - OSPF provides next-hop reachability for BGP
# - Point-to-point interfaces in area 0.0.0.0
# - Loopbacks advertised as passive interfaces
# - This is the traditional enterprise/datacenter approach

- name: Configure OSPF instance and router-id
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} \
      -p {{ gnmi_password }} \
      --skip-verify \
      set \
      --update-path /network-instance[name=default]/protocols/ospf/instance[name=main]/version \
      --update-value ospf-v2 \
      --update-path /network-instance[name=default]/protocols/ospf/instance[name=main]/router-id \
      --update-value {{ router_id }} \
      --update-path /network-instance[name=default]/protocols/ospf/instance[name=main]/admin-state \
      --update-value enable
  delegate_to: localhost
  register: ospf_instance_result
  changed_when: "'UPDATE' in ospf_instance_result.stdout"
  failed_when: ospf_instance_result.rc != 0

- name: Configure OSPF area 0 (created implicitly when adding interfaces)
  ansible.builtin.debug:
    msg: "OSPF area 0.0.0.0 will be created when interfaces are added"

- name: Configure OSPF on point-to-point interfaces
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} \
      -p {{ gnmi_password }} \
      --skip-verify \
      set \
      --update-path /network-instance[name=default]/protocols/ospf/instance[name=main]/area[area-id=0.0.0.0]/interface[interface-name={{ item.name }}.0]/interface-type \
      --update-value point-to-point \
      --update-path /network-instance[name=default]/protocols/ospf/instance[name=main]/area[area-id=0.0.0.0]/interface[interface-name={{ item.name }}.0]/admin-state \
      --update-value enable
  loop: "{{ interfaces }}"
  when: item.ip is defined
  delegate_to: localhost
  register: ospf_interface_result
  changed_when: "'UPDATE' in ospf_interface_result.stdout"
  failed_when: ospf_interface_result.rc != 0

- name: Configure OSPF on loopback (passive)
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} \
      -p {{ gnmi_password }} \
      --skip-verify \
      set \
      --update-path /network-instance[name=default]/protocols/ospf/instance[name=main]/area[area-id=0.0.0.0]/interface[interface-name=system0.0]/passive \
      --update-value true \
      --update-path /network-instance[name=default]/protocols/ospf/instance[name=main]/area[area-id=0.0.0.0]/interface[interface-name=system0.0]/admin-state \
      --update-value enable
  when: loopback_ip is defined
  delegate_to: localhost
  register: ospf_loopback_result
  changed_when: "'UPDATE' in ospf_loopback_result.stdout"
  failed_when: ospf_loopback_result.rc != 0
