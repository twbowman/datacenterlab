---
# EVPN-VXLAN Configuration for SR Linux (gNMI-based)
# Data-driven configuration using evpn_vxlan variables from group_vars
# Uses SR Linux native paths with srl_nokia: origin prefix

# ============================================================================
# VXLAN Tunnel Interface Configuration (Leafs Only)
# ============================================================================

- name: Configure VXLAN tunnel interface
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/tunnel-interface[name=vxlan1]' \
      --update-value '{}'
  delegate_to: localhost
  register: vxlan_tunnel_result
  changed_when: true
  failed_when: vxlan_tunnel_result.rc != 0
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"

- name: Configure VXLAN interfaces for each VNI
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/tunnel-interface[name=vxlan1]/vxlan-interface[index={{ item.vni }}]' \
      --update-value '{
        "type": "bridged",
        "ingress": {
          "vni": {{ item.vni }}
        },
        "egress": {
          "source-ip": "use-system-ipv4-address"
        }
      }'
  delegate_to: localhost
  register: vxlan_vni_result
  changed_when: true
  failed_when: vxlan_vni_result.rc != 0
  loop: "{{ evpn_vxlan.vlan_vni_mappings }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"

# ============================================================================
# MAC-VRF Network Instance Configuration (Leafs Only)
# ============================================================================

- name: Create MAC-VRF network instances for each VLAN
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/network-instance[name=mac-vrf-{{ item.vlan_id }}]' \
      --update-value '{
        "type": "srl_nokia-network-instance:mac-vrf",
        "description": "{{ item.description | default(item.name) }}",
        "admin-state": "enable",
        "vxlan-interface": [
          {
            "name": "vxlan1.{{ item.vni }}"
          }
        ]
      }'
  delegate_to: localhost
  register: macvrf_result
  changed_when: true
  failed_when: macvrf_result.rc != 0
  loop: "{{ evpn_vxlan.vlan_vni_mappings }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"

# ============================================================================
# BGP-EVPN Instance Configuration (Leafs Only)
# ============================================================================

- name: Configure EVPN instances in MAC-VRFs
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/network-instance[name=mac-vrf-{{ item.vlan_id }}]/protocols/bgp-evpn/bgp-instance[id=1]' \
      --update-value '{
        "admin-state": "enable",
        "vxlan-interface": "vxlan1.{{ item.vni }}",
        "evi": {{ item.vni }},
        "ecmp": 2
      }'
  delegate_to: localhost
  register: evpn_instance_result
  changed_when: true
  failed_when: evpn_instance_result.rc != 0
  loop: "{{ evpn_vxlan.vlan_vni_mappings }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"

- name: Configure BGP-VPN instances in MAC-VRFs
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/network-instance[name=mac-vrf-{{ item.vlan_id }}]/protocols/bgp-vpn/bgp-instance[id=1]/route-target' \
      --update-value '{
        "export-rt": "target:{{ asn }}:{{ item.vni }}",
        "import-rt": "target:{{ asn }}:{{ item.vni }}"
      }'
  delegate_to: localhost
  register: bgp_vpn_result
  changed_when: true
  failed_when: bgp_vpn_result.rc != 0
  loop: "{{ evpn_vxlan.vlan_vni_mappings }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"

# ============================================================================
# EVPN Route Advertisement Configuration (Leafs Only)
# ============================================================================

- name: Enable EVPN route advertisement
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/network-instance[name=mac-vrf-{{ item.vlan_id }}]/protocols/bgp-evpn/bgp-instance[id=1]/routes' \
      --update-value '{
        "bridge-table": {
          "mac-ip": {
            "advertise": true
          },
          "inclusive-mcast": {
            "advertise": true
          }
        }
      }'
  delegate_to: localhost
  register: evpn_routes_result
  changed_when: true
  failed_when: evpn_routes_result.rc != 0
  loop: "{{ evpn_vxlan.vlan_vni_mappings }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"

# ============================================================================
# Client-Facing Interface Configuration (Leafs Only)
# ============================================================================

- name: Enable VLAN tagging on client-facing interface
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/interface[name={{ client_interface | default("ethernet-1/3") }}]' \
      --update-value '{
        "admin-state": "enable",
        "vlan-tagging": true
      }'
  delegate_to: localhost
  register: vlan_tagging_result
  changed_when: true
  failed_when: vlan_tagging_result.rc != 0
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"
    - client_interface is defined or 'ethernet-1/3' in (interfaces | map(attribute='name') | list)

- name: Configure client-facing interfaces with subinterfaces
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/interface[name={{ client_interface | default("ethernet-1/3") }}]/subinterface[index={{ item.vlan_id }}]' \
      --update-value '{
        "type": "bridged",
        "admin-state": "enable",
        "vlan": {
          "encap": {
            "single-tagged": {
              "vlan-id": {{ item.vlan_id }}
            }
          }
        }
      }'
  delegate_to: localhost
  register: client_interface_result
  changed_when: true
  failed_when: client_interface_result.rc != 0
  loop: "{{ evpn_vxlan.vlan_vni_mappings }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"
    - client_interface is defined or 'ethernet-1/3' in (interfaces | map(attribute='name') | list)

- name: Associate client interfaces with MAC-VRFs
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/network-instance[name=mac-vrf-{{ item.vlan_id }}]/interface[name={{ client_interface | default("ethernet-1/3") }}.{{ item.vlan_id }}]' \
      --update-value '{}'
  delegate_to: localhost
  register: client_assoc_result
  changed_when: true
  failed_when: client_assoc_result.rc != 0
  loop: "{{ evpn_vxlan.vlan_vni_mappings }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"
    - client_interface is defined or 'ethernet-1/3' in (interfaces | map(attribute='name') | list)

# ============================================================================
# L3 VNI Configuration (Leafs Only) - Optional
# ============================================================================

- name: Configure L3 VNI VXLAN interfaces
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/tunnel-interface[name=vxlan1]/vxlan-interface[index={{ item.vni }}]' \
      --update-value '{
        "type": "routed",
        "ingress": {
          "vni": {{ item.vni }}
        },
        "egress": {
          "source-ip": "use-system-ipv4-address"
        }
      }'
  delegate_to: localhost
  register: l3vni_vxlan_result
  changed_when: true
  failed_when: l3vni_vxlan_result.rc != 0
  loop: "{{ evpn_vxlan.l3vni | default([]) }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"
    - evpn_vxlan.l3vni is defined
    - evpn_vxlan.l3vni | length > 0

- name: Create IP-VRF network instances for L3 VNI
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} -p {{ gnmi_password }} \
      --skip-verify -e json_ietf \
      set --update-path 'srl_nokia:/network-instance[name={{ item.vrf_name }}]' \
      --update-value '{
        "type": "srl_nokia-network-instance:ip-vrf",
        "admin-state": "enable",
        "vxlan-interface": [
          {
            "name": "vxlan1.{{ item.vni }}"
          }
        ]
      }'
  delegate_to: localhost
  register: ipvrf_result
  changed_when: true
  failed_when: ipvrf_result.rc != 0
  loop: "{{ evpn_vxlan.l3vni | default([]) }}"
  when:
    - evpn_vxlan.enabled | default(false)
    - "'leaf' in inventory_hostname"
    - evpn_vxlan.l3vni is defined
    - evpn_vxlan.l3vni | length > 0
