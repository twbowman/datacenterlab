---
# System-level configuration for SR Linux (OpenConfig paths)
# Note: OpenConfig is already enabled, so we use OpenConfig paths for LLDP

- name: Enable LLDP (OpenConfig path)
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} \
      -p {{ gnmi_password }} \
      --skip-verify \
      set \
      --update-path /lldp/config/enabled \
      --update-value true
  delegate_to: localhost
  register: lldp_result
  changed_when: "'UPDATE' in lldp_result.stdout"
  failed_when: lldp_result.rc != 0
  tags: [system, lldp]
