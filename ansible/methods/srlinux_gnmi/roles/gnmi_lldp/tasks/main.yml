---
# tasks file for srlinux_lldp
# Uses native SR Linux paths (OpenConfig SET is not supported on SR Linux)
# Global LLDP is enabled in the gnmi_system role

- name: Enable LLDP on interfaces via gnmic (native SR Linux path)
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} \
      -p {{ gnmi_password }} \
      --skip-verify \
      set \
      --update-path /system/lldp/interface[name={{ item.name }}]/admin-state \
      --update-value enable
  loop: "{{ interfaces }}"
  when: item.ip is defined
  delegate_to: localhost
  register: lldp_interface_result
  changed_when: "'UPDATE' in lldp_interface_result.stdout"
  failed_when: lldp_interface_result.rc != 0
