---
# tasks file for srlinux_lldp (OpenConfig paths)
# Note: LLDP is already enabled globally in the system role

- name: Enable LLDP on interfaces via gnmic (OpenConfig)
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} \
      -p {{ gnmi_password }} \
      --skip-verify \
      set \
      --update-path /lldp/interfaces/interface[name={{ item.name }}]/config/name \
      --update-value {{ item.name }} \
      --update-path /lldp/interfaces/interface[name={{ item.name }}]/config/enabled \
      --update-value true
  loop: "{{ interfaces }}"
  when: item.ip is defined
  delegate_to: localhost
  register: lldp_interface_result
  changed_when: "'UPDATE' in lldp_interface_result.stdout"
  failed_when: lldp_interface_result.rc != 0
