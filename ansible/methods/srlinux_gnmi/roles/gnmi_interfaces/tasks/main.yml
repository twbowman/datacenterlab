---
# tasks file for srlinux_interfaces
# Uses native SR Linux paths with srl_nokia origin throughout
# (OpenConfig SET is not supported on SR Linux)
#
# RATE LIMIT MITIGATION:
# SR Linux enforces a 60 gNMI connections/minute rate limit.
# This role batches all interface + loopback + network-instance configs
# into minimal gnmic set calls using multiple --update-path/--update-value pairs.

- name: Configure all interfaces and loopback (batched)
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} \
      -p {{ gnmi_password }} \
      --skip-verify \
      set \
    {% for iface in interfaces if iface.ip is defined %}
      --update-path 'srl_nokia:/interface[name={{ iface.name }}]/admin-state' \
      --update-value enable \
      --update-path 'srl_nokia:/interface[name={{ iface.name }}]/subinterface[index=0]/admin-state' \
      --update-value enable \
      --update-path 'srl_nokia:/interface[name={{ iface.name }}]/subinterface[index=0]/ipv4/admin-state' \
      --update-value enable \
      --update-path 'srl_nokia:/interface[name={{ iface.name }}]/subinterface[index=0]/ipv4/address[ip-prefix={{ iface.ip }}]' \
      --update-value '{}' \
    {% endfor %}
    {% if loopback_ip is defined %}
      --update-path 'srl_nokia:/interface[name=system0]/admin-state' \
      --update-value enable \
      --update-path 'srl_nokia:/interface[name=system0]/subinterface[index=0]/admin-state' \
      --update-value enable \
      --update-path 'srl_nokia:/interface[name=system0]/subinterface[index=0]/ipv4/admin-state' \
      --update-value enable \
      --update-path 'srl_nokia:/interface[name=system0]/subinterface[index=0]/ipv4/address[ip-prefix={{ loopback_ip }}]' \
      --update-value '{}' \
    {% endif %}
      --encoding json_ietf
  delegate_to: localhost
  register: interface_result
  changed_when: "'UPDATE' in interface_result.stdout"
  failed_when: interface_result.rc != 0

- name: Add all interfaces to default network-instance (batched)
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
      -u {{ gnmi_username }} \
      -p {{ gnmi_password }} \
      --skip-verify \
      set \
    {% for iface in interfaces if iface.ip is defined %}
      --update-path 'srl_nokia:/network-instance[name=default]/interface[name={{ iface.name }}.0]' \
      --update-value '{}' \
    {% endfor %}
    {% if loopback_ip is defined %}
      --update-path 'srl_nokia:/network-instance[name=default]/interface[name=system0.0]' \
      --update-value '{}' \
    {% endif %}
      --encoding json_ietf
  delegate_to: localhost
  register: ni_interface_result
  changed_when: "'UPDATE' in ni_interface_result.stdout"
  failed_when: ni_interface_result.rc != 0
