---
# Juniper validation paths
# OpenConfig origin for most checks; juniper origin for vendor-specific

validate_paths:
  bgp_neighbors:
    path: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state"
    origin: "openconfig"
    remediation_hint: "Check BGP configuration: show bgp summary"

  evpn_state:
    path: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi[afi-safi-name=L2VPN_EVPN]/state"
    origin: "openconfig"
    remediation_hint: "Enable EVPN address family under BGP group/neighbor configuration"

  ospf_neighbors:
    path: "/network-instances/network-instance/protocols/protocol[identifier=OSPF]/ospf/areas/area/interfaces/interface/neighbors/neighbor/state"
    origin: "openconfig"
    remediation_hint: "Verify OSPF is enabled on interfaces: show ospf neighbor"

  lldp_neighbors:
    path: "/lldp/interfaces/interface/neighbors/neighbor/state"
    origin: "openconfig"
    remediation_hint: "Verify LLDP is enabled: set protocols lldp interface all"

  interface_state:
    path: "/interfaces/interface/state"
    origin: "openconfig"
    remediation_hint: "Check physical cabling and interface configuration: show interfaces terse"

  # Juniper vendor-specific checks
  routing_engine:
    path: "/junos/system/routing-engine"
    origin: "juniper"
    remediation_hint: "Check routing engine health: show chassis routing-engine"
