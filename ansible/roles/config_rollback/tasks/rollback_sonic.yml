---
# Execute rollback for SONiC

- name: Check if rollback is available
  fail:
    msg: |
      Rollback requested but no configuration snapshot is available for {{ inventory_hostname }}.
      Cannot perform rollback operation.
  when: not (rollback_available | default(false))

- name: Load rollback configuration
  set_fact:
    rollback_config: "{{ lookup('file', rollback_config_file) }}"

- name: Restore SONiC configuration
  dellemc.enterprise_sonic.sonic_config:
    src: "{{ rollback_config_file }}"
  register: rollback_result
  ignore_errors: true

- name: Report rollback success
  debug:
    msg: |
      ✓ Configuration rollback successful for {{ inventory_hostname }}
      Restored from: {{ rollback_config_file }}
  when: rollback_result is succeeded

- name: Report rollback failure
  debug:
    msg: |
      ✗ Configuration rollback FAILED for {{ inventory_hostname }}
      Error: {{ rollback_result.msg | default('Unknown error') }}
      Manual intervention required.
      Rollback file: {{ rollback_config_file }}
  when: rollback_result is failed

- name: Fail if rollback failed
  fail:
    msg: "Rollback operation failed for {{ inventory_hostname }}. Manual recovery required."
  when: rollback_result is failed

