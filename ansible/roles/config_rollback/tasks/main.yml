---
# Configuration rollback dispatcher
# Captures state before changes and rolls back on failure

- name: Display rollback information
  debug:
    msg: "Setting up rollback capability for {{ ansible_network_os | default('unknown') }} on {{ inventory_hostname }}"

- name: Normalize network OS name for rollback
  set_fact:
    normalized_os: "{{ ansible_network_os | regex_replace('^nokia\\.', '') | regex_replace('^arista\\.', '') | regex_replace('^dellemc\\.', '') | regex_replace('^juniper\\.', '') }}"

- name: Capture SR Linux configuration state
  include_tasks: capture_srlinux.yml
  when: normalized_os == 'srlinux'

- name: Capture Arista EOS configuration state
  include_tasks: capture_arista.yml
  when: normalized_os == 'eos'

- name: Capture SONiC configuration state
  include_tasks: capture_sonic.yml
  when: normalized_os == 'sonic'

- name: Capture Juniper configuration state
  include_tasks: capture_junos.yml
  when: normalized_os == 'junos'

- name: Fail if network OS is not supported
  fail:
    msg: |
      Network OS '{{ ansible_network_os | default('undefined') }}' is not supported for rollback.
      Supported vendors: SR Linux, Arista EOS, SONiC, Juniper
  when: normalized_os not in ['srlinux', 'eos', 'sonic', 'junos']

