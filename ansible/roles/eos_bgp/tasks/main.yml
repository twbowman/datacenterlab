---
# tasks file for eos_bgp
# Arista EOS BGP configuration using arista.eos collection

- name: Configure BGP global settings
  arista.eos.eos_bgp_global:
    config:
      as_number: "{{ asn }}"
      router_id: "{{ router_id }}"
      bgp:
        default:
          ipv4_unicast: false
    state: merged

- name: Configure BGP address family IPv4 unicast
  arista.eos.eos_bgp_address_family:
    config:
      as_number: "{{ asn }}"
      address_family:
        - afi: "ipv4"
          safi: "unicast"
    state: merged

- name: Configure BGP address family EVPN
  arista.eos.eos_bgp_address_family:
    config:
      as_number: "{{ asn }}"
      address_family:
        - afi: "l2vpn"
          safi: "evpn"
    state: merged

- name: Configure BGP neighbors
  arista.eos.eos_bgp_global:
    config:
      as_number: "{{ asn }}"
      neighbor:
        - peer: "{{ item.peer_address }}"
          remote_as: "{{ item.peer_asn }}"
          description: "{{ item.description | default('BGP peer') }}"
          update_source: "Loopback0"
    state: merged
  loop: "{{ bgp_neighbors }}"
  when: bgp_neighbors is defined

- name: Activate BGP neighbors for IPv4 unicast
  arista.eos.eos_bgp_address_family:
    config:
      as_number: "{{ asn }}"
      address_family:
        - afi: "ipv4"
          safi: "unicast"
          neighbor:
            - peer: "{{ item.peer_address }}"
              activate: true
    state: merged
  loop: "{{ bgp_neighbors }}"
  when: bgp_neighbors is defined

- name: Activate BGP neighbors for EVPN
  arista.eos.eos_bgp_address_family:
    config:
      as_number: "{{ asn }}"
      address_family:
        - afi: "l2vpn"
          safi: "evpn"
          neighbor:
            - peer: "{{ item.peer_address }}"
              activate: true
    state: merged
  loop: "{{ bgp_neighbors }}"
  when: bgp_neighbors is defined

- name: Configure route reflector (spines only)
  arista.eos.eos_bgp_global:
    config:
      as_number: "{{ asn }}"
      neighbor:
        - peer: "{{ item.peer_address }}"
          route_reflector_client: true
    state: merged
  loop: "{{ bgp_neighbors }}"
  when: 
    - bgp_role is defined
    - bgp_role == 'route_reflector'
    - bgp_neighbors is defined

- name: Display BGP configuration results
  ansible.builtin.debug:
    msg: "BGP configured on {{ inventory_hostname }} - AS{{ asn }} using Arista EOS modules"
  when: eos_bgp_debug | default(false)
