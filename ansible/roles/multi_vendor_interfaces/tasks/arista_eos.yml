---
# Arista EOS specific interface configuration using native modules

- name: Translate SR Linux interface names to EOS format
  set_fact:
    eos_interfaces: "{{ interfaces | map('combine', {'eos_name': item.name | regex_replace('ethernet-(\\d+)/(\\d+)', 'Ethernet\\1/\\2')}) | list }}"
  vars:
    item: "{{ interfaces[0] }}"
  when: interfaces is defined

- name: Configure interface state and description (Arista EOS)
  arista.eos.eos_interfaces:
    config:
      - name: "{{ item.name | regex_replace('ethernet-(\\d+)/(\\d+)', 'Ethernet\\1/\\2') }}"
        description: "{{ item.description | default(omit) }}"
        enabled: true
    state: merged
  loop: "{{ interfaces }}"
  when: interfaces is defined

- name: Configure IPv4 addresses (Arista EOS)
  arista.eos.eos_l3_interfaces:
    config:
      - name: "{{ item.name | regex_replace('ethernet-(\\d+)/(\\d+)', 'Ethernet\\1/\\2') }}"
        ipv4:
          - address: "{{ item.ip }}"
    state: merged
  loop: "{{ interfaces }}"
  when: 
    - interfaces is defined
    - item.ip is defined

