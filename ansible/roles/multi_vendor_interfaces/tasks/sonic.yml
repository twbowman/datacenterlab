---
# SONiC specific interface configuration using native modules

- name: Configure interfaces (SONiC)
  dellemc.enterprise_sonic.sonic_interfaces:
    config:
      - name: "{{ item.name | regex_replace('ethernet-(\\d+)/(\\d+)', 'Ethernet\\1') }}"
        description: "{{ item.description | default(omit) }}"
        enabled: true
    state: merged
  loop: "{{ interfaces }}"
  when: interfaces is defined

- name: Configure IPv4 addresses (SONiC)
  dellemc.enterprise_sonic.sonic_l3_interfaces:
    config:
      - name: "{{ item.name | regex_replace('ethernet-(\\d+)/(\\d+)', 'Ethernet\\1') }}"
        ipv4:
          addresses:
            - address: "{{ item.ip }}"
    state: merged
  loop: "{{ interfaces }}"
  when:
    - interfaces is defined
    - item.ip is defined

# Note: SONiC interface naming varies by vendor implementation
# Dell: Ethernet0, Ethernet1, etc.
# Mellanox: Ethernet0, Ethernet4, etc. (4-port increments)
# Adjust regex_replace based on your hardware
