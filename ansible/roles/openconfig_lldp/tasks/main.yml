---
# tasks file for openconfig_lldp
- name: Check if LLDP is globally enabled
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ ansible_port }} \
      -u {{ ansible_user }} \
      -p {{ ansible_password }} \
      --skip-verify \
      --encoding json_ietf \
      get \
      --path "openconfig:/lldp/config/enabled" \
      --format json 2>/dev/null || echo "null"
  register: lldp_global_check
  changed_when: false
  failed_when: false
  delegate_to: localhost

- name: Enable LLDP globally using OpenConfig gNMI
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ ansible_port }} \
      -u {{ ansible_user }} \
      -p {{ ansible_password }} \
      --skip-verify \
      --encoding json_ietf \
      set \
      --update-path "openconfig:/lldp/config" \
      --update-value '{"enabled":true}'
  when: lldp_global_check.stdout == "null" or "false" in lldp_global_check.stdout
  delegate_to: localhost
  register: lldp_global_result
  changed_when: lldp_global_result.rc == 0

- name: Check LLDP interface configuration
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ ansible_port }} \
      -u {{ ansible_user }} \
      -p {{ ansible_password }} \
      --skip-verify \
      --encoding json_ietf \
      get \
      --path "openconfig:/lldp/interfaces/interface[name={{ item.name }}]/config/enabled" \
      --format json 2>/dev/null || echo "null"
  register: lldp_interface_check
  changed_when: false
  failed_when: false
  loop: "{{ interfaces }}"
  delegate_to: localhost

- name: Enable LLDP on interfaces using OpenConfig gNMI
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ ansible_port }} \
      -u {{ ansible_user }} \
      -p {{ ansible_password }} \
      --skip-verify \
      --encoding json_ietf \
      set \
      --update-path "openconfig:/lldp/interfaces/interface[name={{ item.item.name }}]/config" \
      --update-value '{"name":"{{ item.item.name }}","enabled":true}'
  loop: "{{ lldp_interface_check.results }}"
  when: item.stdout == "null" or "false" in item.stdout
  delegate_to: localhost
  register: lldp_interface_result
  changed_when: lldp_interface_result.rc == 0

- name: Display LLDP configuration results
  ansible.builtin.debug:
    msg: "LLDP configured on {{ inventory_hostname }} using OpenConfig gNMI"
  when: openconfig_lldp_debug | default(false)
