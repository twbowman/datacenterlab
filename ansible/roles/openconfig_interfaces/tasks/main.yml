---
# tasks file for openconfig_interfaces
- name: Check if system0 loopback exists (leafs only)
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ ansible_port }} \
      -u {{ ansible_user }} \
      -p {{ ansible_password }} \
      --skip-verify \
      --encoding json_ietf \
      get \
      --path "openconfig:/interfaces/interface[name=system0]/config/enabled" \
      --format json 2>/dev/null || echo "null"
  register: system0_check
  changed_when: false
  failed_when: false
  when: loopback_ip is defined
  delegate_to: localhost

- name: Configure system0 loopback using OpenConfig gNMI (leafs only)
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ ansible_port }} \
      -u {{ ansible_user }} \
      -p {{ ansible_password }} \
      --skip-verify \
      --encoding json_ietf \
      set \
      --update-path "openconfig:/interfaces/interface[name=system0]/config" \
      --update-value '{"name":"system0","type":"softwareLoopback","enabled":true}' \
      --update-path "openconfig:/interfaces/interface[name=system0]/subinterfaces/subinterface[index=0]/ipv4/addresses/address[ip={{ loopback_ip.split('/')[0] }}]/config" \
      --update-value '{"ip":"{{ loopback_ip.split('/')[0] }}","prefix-length":{{ loopback_ip.split('/')[1] }}}'
  when: 
    - loopback_ip is defined
    - system0_check.stdout == "null" or "false" in system0_check.stdout
  delegate_to: localhost
  register: system0_result
  changed_when: system0_result.rc == 0

- name: Check physical interface configuration
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ ansible_port }} \
      -u {{ ansible_user }} \
      -p {{ ansible_password }} \
      --skip-verify \
      --encoding json_ietf \
      get \
      --path "openconfig:/interfaces/interface[name={{ item.name }}]/config/enabled" \
      --format json 2>/dev/null || echo "null"
  register: interface_check
  changed_when: false
  failed_when: false
  loop: "{{ interfaces }}"
  when: item.ip is defined
  delegate_to: localhost

- name: Configure physical interfaces using OpenConfig gNMI
  ansible.builtin.shell: |
    gnmic -a {{ ansible_host }}:{{ ansible_port }} \
      -u {{ ansible_user }} \
      -p {{ ansible_password }} \
      --skip-verify \
      --encoding json_ietf \
      set \
      --update-path "openconfig:/interfaces/interface[name={{ item.item.name }}]/config" \
      --update-value '{"name":"{{ item.item.name }}","type":"ethernetCsmacd","description":"{{ item.item.description | default('') }}","enabled":true}' \
      --update-path "openconfig:/interfaces/interface[name={{ item.item.name }}]/subinterfaces/subinterface[index=0]/ipv4/addresses/address[ip={{ item.item.ip.split('/')[0] }}]/config" \
      --update-value '{"ip":"{{ item.item.ip.split('/')[0] }}","prefix-length":{{ item.item.ip.split('/')[1] }}}'
  loop: "{{ interface_check.results }}"
  when: 
    - item.item.ip is defined
    - item.stdout == "null" or "false" in item.stdout
  delegate_to: localhost
  register: interface_result
  changed_when: interface_result.rc == 0

- name: Display interface configuration results
  ansible.builtin.debug:
    msg: "Interfaces configured on {{ inventory_hostname }} using OpenConfig gNMI"
  when: openconfig_interfaces_debug | default(false)
