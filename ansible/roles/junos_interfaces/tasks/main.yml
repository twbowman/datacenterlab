---
# tasks file for junos_interfaces
# Juniper Junos interface configuration using junipernetworks.junos collection

- name: Configure loopback interface (leafs only)
  junipernetworks.junos.junos_interfaces:
    config:
      - name: lo0
        description: "Router ID and BGP loopback"
        enabled: true
    state: merged
  when: loopback_ip is defined

- name: Configure loopback IP address (leafs only)
  junipernetworks.junos.junos_l3_interfaces:
    config:
      - name: lo0
        ipv4:
          - address: "{{ loopback_ip }}"
    state: merged
  when: loopback_ip is defined

- name: Configure physical interfaces
  junipernetworks.junos.junos_interfaces:
    config:
      - name: "{{ item.name | to_junos_interface }}"
        description: "{{ item.description | default('') }}"
        enabled: true
    state: merged
  loop: "{{ interfaces }}"
  when: item.ip is defined or item.description is defined

- name: Configure interface IP addresses
  junipernetworks.junos.junos_l3_interfaces:
    config:
      - name: "{{ item.name | to_junos_interface }}"
        ipv4:
          - address: "{{ item.ip }}"
    state: merged
  loop: "{{ interfaces }}"
  when: item.ip is defined

- name: Display interface configuration results
  ansible.builtin.debug:
    msg: "Interfaces configured on {{ inventory_hostname }} using Juniper Junos modules"
  when: junos_interfaces_debug | default(false)
