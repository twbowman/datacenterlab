---
- name: Verify LLDP using OpenConfig
  hosts: all
  gather_facts: no
  tasks:
    - name: Get LLDP global status using OpenConfig
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ gnmi_port }}/jsonrpc"
        method: POST
        body_format: json
        validate_certs: no
        headers:
          Content-Type: "application/json"
        body:
          jsonrpc: "2.0"
          id: 1
          method: "get"
          params:
            prefix:
              origin: "openconfig"
            path: "/lldp/config/enabled"
            encoding: "json_ietf"
        user: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        force_basic_auth: yes
      register: lldp_status
      failed_when: false

    - name: Display LLDP global status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: LLDP enabled = {{ lldp_status.json.result | default('Unknown') }}"

    - name: Get LLDP neighbors using OpenConfig
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ gnmi_port }}/jsonrpc"
        method: POST
        body_format: json
        validate_certs: no
        headers:
          Content-Type: "application/json"
        body:
          jsonrpc: "2.0"
          id: 2
          method: "get"
          params:
            prefix:
              origin: "openconfig"
            path: "/lldp/interfaces/interface[name=*]/neighbors"
            encoding: "json_ietf"
        user: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        force_basic_auth: yes
      register: lldp_neighbors
      failed_when: false

    - name: Display LLDP neighbors
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} LLDP neighbors: {{ lldp_neighbors.json.result | default('No neighbors found') }}"

    - name: Get LLDP interface status using OpenConfig
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ gnmi_port }}/jsonrpc"
        method: POST
        body_format: json
        validate_certs: no
        headers:
          Content-Type: "application/json"
        body:
          jsonrpc: "2.0"
          id: "{{ idx + 10 }}"
          method: "get"
          params:
            prefix:
              origin: "openconfig"
            path: "/lldp/interfaces/interface[name={{ item.name }}]/config/enabled"
            encoding: "json_ietf"
        user: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        force_basic_auth: yes
      loop: "{{ interfaces }}"
      loop_control:
        index_var: idx
      register: lldp_interface_status
      failed_when: false

    - name: Display LLDP interface status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} - {{ item.item.name }}: {{ item.json.result | default('Not configured') }}"
      loop: "{{ lldp_interface_status.results }}"
      when: lldp_interface_status.results is defined

