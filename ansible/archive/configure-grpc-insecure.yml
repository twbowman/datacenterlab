---
- name: Configure insecure gRPC server for telemetry
  hosts: all
  gather_facts: no
  tasks:
    - name: Configure insecure gRPC server via CLI
      ansible.builtin.shell: |
        docker exec clab-gnmi-clos-{{ inventory_hostname }} bash -c 'sr_cli <<EOF
        enter candidate
        system grpc-server insecure-mgmt admin-state enable
        system grpc-server insecure-mgmt network-instance mgmt
        system grpc-server insecure-mgmt port 57401
        system grpc-server insecure-mgmt services [ gnmi gnoi ]
        commit now
        EOF'
      delegate_to: localhost
      register: grpc_result

    - name: Display result
      ansible.builtin.debug:
        msg: "gRPC insecure server configured on {{ inventory_hostname }}"
