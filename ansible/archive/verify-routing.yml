---
- name: Verify network routing configuration
  hosts: all
  gather_facts: no
  tasks:
    - name: Get interface operational status
      ansible.builtin.shell: |
        gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
          --username {{ gnmi_username }} \
          --password {{ gnmi_password }} \
          --skip-verify \
          --encoding json_ietf \
          get --path /interface[name=ethernet-*]/oper-state \
          --format json
      delegate_to: localhost
      register: interface_status
      failed_when: false

    - name: Parse interface status
      ansible.builtin.set_fact:
        interfaces_parsed: "{{ interface_status.stdout | from_json }}"
      when: interface_status.rc == 0

    - name: Get loopback interface (leafs only)
      ansible.builtin.shell: |
        gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
          --username {{ gnmi_username }} \
          --password {{ gnmi_password }} \
          --skip-verify \
          --encoding json_ietf \
          get --path /interface[name=system0]/subinterface[index=0]/ipv4/address \
          --format json
      delegate_to: localhost
      register: loopback_status
      when: loopback_ip is defined
      failed_when: false

    - name: Get BGP neighbor status
      ansible.builtin.shell: |
        gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
          --username {{ gnmi_username }} \
          --password {{ gnmi_password }} \
          --skip-verify \
          --encoding json_ietf \
          get --path /network-instance[name=default]/protocols/bgp/neighbor \
          --format json
      delegate_to: localhost
      register: bgp_neighbors
      failed_when: false

    - name: Parse BGP neighbors
      ansible.builtin.set_fact:
        bgp_parsed: "{{ bgp_neighbors.stdout | from_json }}"
      when: bgp_neighbors.rc == 0 and bgp_neighbors.stdout != ""

    - name: Get BGP statistics
      ansible.builtin.shell: |
        gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
          --username {{ gnmi_username }} \
          --password {{ gnmi_password }} \
          --skip-verify \
          --encoding json_ietf \
          get --path /network-instance[name=default]/protocols/bgp/statistics \
          --format json
      delegate_to: localhost
      register: bgp_stats
      failed_when: false

    - name: Get routing table summary
      ansible.builtin.shell: |
        gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
          --username {{ gnmi_username }} \
          --password {{ gnmi_password }} \
          --skip-verify \
          --encoding json_ietf \
          get --path /network-instance[name=default]/route-table/ipv4-unicast/statistics \
          --format json
      delegate_to: localhost
      register: route_stats
      failed_when: false

- name: Generate verification report
  hosts: all
  gather_facts: no
  tasks:
    - name: Count operational interfaces
      ansible.builtin.set_fact:
        up_interfaces: "{{ interfaces_parsed[0].updates | selectattr('values', 'defined') | 
                          map(attribute='values') | list | 
                          map('dict2items') | flatten | 
                          selectattr('value', 'equalto', 'up') | list | length }}"
      when: interfaces_parsed is defined

    - name: Extract BGP neighbor states
      ansible.builtin.set_fact:
        bgp_sessions: "{{ bgp_parsed[0].updates[0].values | dict2items | 
                         selectattr('key', 'search', 'neighbor') | 
                         map(attribute='value') | list }}"
      when: bgp_parsed is defined and bgp_parsed[0].updates is defined

    - name: Count established BGP sessions
      ansible.builtin.set_fact:
        established_count: "{{ bgp_sessions | selectattr('session-state', 'defined') | 
                              selectattr('session-state', 'equalto', 'established') | 
                              list | length }}"
        total_neighbors: "{{ bgp_sessions | length }}"
      when: bgp_sessions is defined

    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "{{ inventory_hostname }} ({{ ansible_host }})"
          - "=========================================="
          - "Interfaces UP: {{ up_interfaces | default('N/A') }}"
          - "BGP Neighbors: {{ total_neighbors | default(0) }}"
          - "BGP Established: {{ established_count | default(0) }}"
          - "Status: {% if established_count is defined and total_neighbors is defined and established_count|int == total_neighbors|int %}✓ All BGP sessions UP{% elif established_count is defined and established_count|int > 0 %}⚠ Partial connectivity{% else %}✗ No BGP sessions{% endif %}"
