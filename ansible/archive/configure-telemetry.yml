---
- name: Configure gNMI telemetry streaming (dial-out)
  hosts: all
  gather_facts: no
  vars:
    telegraf_host: "172.20.20.4"
    telegraf_port: "57500"
  tasks:
    - name: Create telemetry configuration for {{ inventory_hostname }}
      ansible.builtin.template:
        src: templates/telemetry-config.j2
        dest: "/tmp/{{ inventory_hostname }}-telemetry.json"
      delegate_to: localhost

    - name: Apply telemetry configuration via gnmic
      ansible.builtin.shell: |
        gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
          --username {{ gnmi_username }} \
          --password {{ gnmi_password }} \
          --skip-verify \
          --encoding json_ietf \
          set \
          --update-path / \
          --update-file /tmp/{{ inventory_hostname }}-telemetry.json
      delegate_to: localhost
      register: telemetry_result
      failed_when: false

    - name: Display telemetry configuration result
      ansible.builtin.debug:
        msg: "{{ telemetry_result.stdout_lines }}"
      when: telemetry_result.stdout_lines is defined
