---
- name: Simple network verification
  hosts: all
  gather_facts: no
  tasks:
    - name: Check interface status
      ansible.builtin.shell: |
        gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
          --username {{ gnmi_username }} \
          --password {{ gnmi_password }} \
          --skip-verify \
          --encoding json_ietf \
          get --path '/interface[name=ethernet-1/1]/oper-state' \
          --path '/interface[name=ethernet-1/2]/oper-state' \
          --path '/interface[name=ethernet-1/3]/oper-state' \
          --path '/interface[name=ethernet-1/4]/oper-state' \
          --format flat
      delegate_to: localhost
      register: iface_check
      failed_when: false

    - name: Check BGP session state
      ansible.builtin.shell: |
        gnmic -a {{ ansible_host }}:{{ gnmi_port }} \
          --username {{ gnmi_username }} \
          --password {{ gnmi_password }} \
          --skip-verify \
          --encoding json_ietf \
          get --path '/network-instance[name=default]/protocols/bgp/neighbor[peer-address=*]/session-state' \
          --format flat
      delegate_to: localhost
      register: bgp_check
      failed_when: false

    - name: Display status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "{{ inventory_hostname }} Status"
          - "=========================================="
          - "Interfaces:"
          - "{{ iface_check.stdout_lines | default(['No data']) }}"
          - ""
          - "BGP Sessions:"
          - "{{ bgp_check.stdout_lines | default(['No BGP neighbors']) }}"
          - "=========================================="
