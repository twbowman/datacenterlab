# Prometheus configuration for gNMIc telemetry
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'gnmi-clos'
    environment: 'lab'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

scrape_configs:
  # gNMIc metrics endpoint
  - job_name: 'gnmic'
    static_configs:
      - targets: ['clab-monitoring-gnmic:9273']
        labels:
          source: 'gnmic'
          collector: 'gnmic'
    scrape_interval: 10s
    scrape_timeout: 10s
    # Honor labels from gNMIc so exported_source becomes source (device name)
    honor_labels: true
    metric_relabel_configs:
      # =========================================================================
      # STEP 1: Fix source label - gNMIc sets source=<device_name> but Prometheus
      # overwrites it with the job source. With honor_labels: true, the original
      # gNMIc source label is preserved as-is. But since gNMIc's prometheus output
      # uses "source" for the target name, we need to ensure it's correct.
      # With honor_labels: true, the gNMIc "source" label (device name) is kept,
      # and Prometheus puts its own source into "exported_source" instead.
      # Actually with honor_labels: true, gNMIc's source label wins.
      # Let's verify by checking - if source is still "gnmic", copy from exported_source.
      # =========================================================================

      # =========================================================================
      # STEP 2: Add vendor label (all current devices are Nokia SR Linux)
      # =========================================================================
      - target_label: vendor
        replacement: 'nokia'

      # =========================================================================
      # STEP 3: Derive role label from source (device name)
      # =========================================================================
      - source_labels: [source]
        target_label: role
        regex: '(spine)\d+'
        replacement: 'spine'

      - source_labels: [source]
        target_label: role
        regex: '(leaf)\d+'
        replacement: 'leaf'

      # =========================================================================
      # STEP 4: Interface name normalization
      # =========================================================================

      # SR Linux: ethernet-1/1 -> eth1_1
      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: 'ethernet-(\d+)/(\d+)'
        replacement: 'eth${1}_${2}'

      # Arista: Ethernet1/1 -> eth1_1
      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: 'Ethernet(\d+)/(\d+)'
        replacement: 'eth${1}_${2}'

      # Arista/SONiC: Ethernet1 -> eth1_0
      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: 'Ethernet(\d+)'
        replacement: 'eth${1}_0'

      # Juniper: ge-0/0/0, xe-0/0/0, et-0/0/0 -> eth0_0_0
      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: '[gx]e-(\d+)/(\d+)/(\d+)'
        replacement: 'eth${1}_${2}_${3}'

      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: 'et-(\d+)/(\d+)/(\d+)'
        replacement: 'eth${1}_${2}_${3}'

      # Also normalize the 'interface' label if present
      - source_labels: [interface]
        target_label: interface_normalized
        regex: 'ethernet-(\d+)/(\d+)'
        replacement: 'eth${1}_${2}'

      - source_labels: [interface]
        target_label: interface_normalized
        regex: 'Ethernet(\d+)/(\d+)'
        replacement: 'eth${1}_${2}'

      - source_labels: [interface]
        target_label: interface_normalized
        regex: 'Ethernet(\d+)'
        replacement: 'eth${1}_0'

      # =========================================================================
      # STEP 5: Metric name normalization - Interface counters
      # Map gnmic_oc_interface_stats_..._counters_<metric> -> network_interface_<metric>
      # =========================================================================
      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_octets'
        replacement: 'network_interface_in_octets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_octets'
        replacement: 'network_interface_out_octets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_pkts'
        replacement: 'network_interface_in_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_pkts'
        replacement: 'network_interface_out_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_errors'
        replacement: 'network_interface_in_errors'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_errors'
        replacement: 'network_interface_out_errors'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_discards'
        replacement: 'network_interface_in_discards'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_discards'
        replacement: 'network_interface_out_discards'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_unicast_pkts'
        replacement: 'network_interface_in_unicast_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_unicast_pkts'
        replacement: 'network_interface_out_unicast_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_broadcast_pkts'
        replacement: 'network_interface_in_broadcast_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_broadcast_pkts'
        replacement: 'network_interface_out_broadcast_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_multicast_pkts'
        replacement: 'network_interface_in_multicast_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_multicast_pkts'
        replacement: 'network_interface_out_multicast_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_carrier_transitions'
        replacement: 'network_interface_carrier_transitions'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_fcs_errors'
        replacement: 'network_interface_in_fcs_errors'

      # Interface state metrics
      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_oper_status'
        replacement: 'network_interface_oper_status'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_admin_status'
        replacement: 'network_interface_admin_status'

      # =========================================================================
      # STEP 6: Metric name normalization - BGP metrics
      # Map gnmic_oc_bgp_neighbors_..._state_<metric> -> network_bgp_<metric>
      # =========================================================================
      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_session_state'
        replacement: 'network_bgp_session_state'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_established_transitions'
        replacement: 'network_bgp_established_transitions'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_last_established'
        replacement: 'network_bgp_last_established'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_peer_as'
        replacement: 'network_bgp_peer_as'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_local_as'
        replacement: 'network_bgp_local_as'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_enabled'
        replacement: 'network_bgp_enabled'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_neighbor_address'
        replacement: 'network_bgp_neighbor_address'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_peer_group'
        replacement: 'network_bgp_peer_group'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_peer_type'
        replacement: 'network_bgp_peer_type'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_queues_input'
        replacement: 'network_bgp_queues_input'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_queues_output'
        replacement: 'network_bgp_queues_output'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_messages_received_UPDATE'
        replacement: 'network_bgp_messages_received_update'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_messages_sent_UPDATE'
        replacement: 'network_bgp_messages_sent_update'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_messages_received_NOTIFICATION'
        replacement: 'network_bgp_messages_received_notification'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_messages_sent_NOTIFICATION'
        replacement: 'network_bgp_messages_sent_notification'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_remove_private_as'
        replacement: 'network_bgp_remove_private_as'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_supported_capabilities_.*'
        replacement: 'network_bgp_supported_capabilities'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_messages_received_last_notification_.*'
        replacement: 'network_bgp_last_notification_received'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_bgp_neighbors_openconfig_network_instance_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_messages_sent_last_notification_.*'
        replacement: 'network_bgp_last_notification_sent'

      # =========================================================================
      # STEP 7: Metric name normalization - LLDP metrics
      # Map gnmic_oc_lldp_..._state_<metric> -> network_lldp_<metric>
      # =========================================================================
      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_system_name'
        replacement: 'network_lldp_neighbor_system_name'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_port_id'
        replacement: 'network_lldp_neighbor_port_id'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_chassis_id'
        replacement: 'network_lldp_neighbor_chassis_id'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_port_description'
        replacement: 'network_lldp_neighbor_port_description'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_system_description'
        replacement: 'network_lldp_neighbor_system_description'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_chassis_id_type'
        replacement: 'network_lldp_neighbor_chassis_id_type'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_port_id_type'
        replacement: 'network_lldp_neighbor_port_id_type'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_age'
        replacement: 'network_lldp_neighbor_age'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_last_update'
        replacement: 'network_lldp_neighbor_last_update'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_lldp_openconfig_lldp_lldp_interfaces_interface_neighbors_neighbor_state_id'
        replacement: 'network_lldp_neighbor_id'

      # =========================================================================
      # STEP 8: Metric name normalization - QoS metrics
      # Map gnmic_oc_qos_queues_..._state_<metric> -> network_qos_<metric>
      # =========================================================================
      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_qos_queues_openconfig_qos_qos_interfaces_interface_output_queues_queue_state_transmit_pkts'
        replacement: 'network_qos_transmit_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_qos_queues_openconfig_qos_qos_interfaces_interface_output_queues_queue_state_transmit_octets'
        replacement: 'network_qos_transmit_octets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_qos_queues_openconfig_qos_qos_interfaces_interface_output_queues_queue_state_dropped_pkts'
        replacement: 'network_qos_dropped_packets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_qos_queues_openconfig_qos_qos_interfaces_interface_output_queues_queue_state_dropped_octets'
        replacement: 'network_qos_dropped_octets'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_qos_queues_openconfig_qos_qos_interfaces_interface_output_queues_queue_state_max_queue_len'
        replacement: 'network_qos_max_queue_length'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_qos_queues_openconfig_qos_qos_interfaces_interface_output_queues_queue_state_name'
        replacement: 'network_qos_queue_name'

      - source_labels: [__name__]
        target_label: __name__
        regex: 'gnmic_oc_qos_queues_openconfig_qos_qos_interfaces_interface_output_queues_queue_state_queue_management_profile'
        replacement: 'network_qos_queue_management_profile'

      # =========================================================================
      # Topology labels
      # =========================================================================
      - source_labels: [cluster]
        target_label: topology
        regex: '(.*)'
        replacement: '$1'

      - source_labels: [role]
        target_label: fabric_type
        regex: '(spine|leaf)'
        replacement: 'clos'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
