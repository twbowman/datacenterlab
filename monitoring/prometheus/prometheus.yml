# Prometheus configuration for gNMIc telemetry
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'gnmi-clos'
    environment: 'lab'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

scrape_configs:
  # gNMIc metrics endpoint
  - job_name: 'gnmic'
    static_configs:
      - targets: ['clab-monitoring-gnmic:9273']
        labels:
          source: 'gnmic'
          collector: 'gnmic'
    scrape_interval: 10s
    scrape_timeout: 10s
    # Honor labels from gNMIc so exported_source becomes source (device name)
    honor_labels: true
    metric_relabel_configs:
      # =========================================================================
      # STEP 1: Fix source label - gNMIc sets source=<device_name> but Prometheus
      # overwrites it with the job source. With honor_labels: true, the original
      # gNMIc source label is preserved as-is. But since gNMIc's prometheus output
      # uses "source" for the target name, we need to ensure it's correct.
      # With honor_labels: true, the gNMIc "source" label (device name) is kept,
      # and Prometheus puts its own source into "exported_source" instead.
      # Actually with honor_labels: true, gNMIc's source label wins.
      # Let's verify by checking - if source is still "gnmic", copy from exported_source.
      # =========================================================================

      # =========================================================================
      # STEP 2: Add vendor label (all current devices are Nokia SR Linux)
      # =========================================================================
      - target_label: vendor
        replacement: 'nokia'

      # =========================================================================
      # STEP 3: Derive role label from source (device name)
      # =========================================================================
      - source_labels: [source]
        target_label: role
        regex: '(spine)\d+'
        replacement: 'spine'

      - source_labels: [source]
        target_label: role
        regex: '(leaf)\d+'
        replacement: 'leaf'

      # =========================================================================
      # STEP 4: Interface name normalization
      # =========================================================================

      # SR Linux: ethernet-1/1 -> eth1_1
      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: 'ethernet-(\d+)/(\d+)'
        replacement: 'eth${1}_${2}'

      # Arista: Ethernet1/1 -> eth1_1
      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: 'Ethernet(\d+)/(\d+)'
        replacement: 'eth${1}_${2}'

      # Arista/SONiC: Ethernet1 -> eth1_0
      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: 'Ethernet(\d+)'
        replacement: 'eth${1}_0'

      # Juniper: ge-0/0/0, xe-0/0/0, et-0/0/0 -> eth0_0_0
      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: '[gx]e-(\d+)/(\d+)/(\d+)'
        replacement: 'eth${1}_${2}_${3}'

      - source_labels: [interface_name]
        target_label: interface_normalized
        regex: 'et-(\d+)/(\d+)/(\d+)'
        replacement: 'eth${1}_${2}_${3}'

      # Also normalize the 'interface' label if present
      - source_labels: [interface]
        target_label: interface_normalized
        regex: 'ethernet-(\d+)/(\d+)'
        replacement: 'eth${1}_${2}'

      - source_labels: [interface]
        target_label: interface_normalized
        regex: 'Ethernet(\d+)/(\d+)'
        replacement: 'eth${1}_${2}'

      - source_labels: [interface]
        target_label: interface_normalized
        regex: 'Ethernet(\d+)'
        replacement: 'eth${1}_0'

      # =========================================================================
      # Topology labels
      # =========================================================================
      - source_labels: [cluster]
        target_label: topology
        regex: '(.*)'
        replacement: '$1'

      - source_labels: [role]
        target_label: fabric_type
        regex: '(spine|leaf)'
        replacement: 'clos'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
