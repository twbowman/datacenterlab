            old: "gnmic_srl_vxlan_srl_nokia_tunnel_interfaces_tunnel_interface_vxlan_interface_bridge_table_srl_nokia_tunnel_interfaces_vxlan_interface_bridge_table_statistics_failed_entries"
            new: "network_vxlan_bridge_failed_entries"
        - replace:
