username: admin
password: NokiaSrl1!
skip-verify: true
encoding: json_ietf

targets:
  spine1:
    address: clab-gnmi-clos-spine1:57400
  spine2:
    address: clab-gnmi-clos-spine2:57400
  leaf1:
    address: clab-gnmi-clos-leaf1:57400
  leaf2:
    address: clab-gnmi-clos-leaf2:57400
  leaf3:
    address: clab-gnmi-clos-leaf3:57400
  leaf4:
    address: clab-gnmi-clos-leaf4:57400

subscriptions:
  # OpenConfig interface stats - works across vendors
  oc_interface_stats:
    paths:
      - /interfaces/interface/state/counters
      - /interfaces/interface/state/oper-status
      - /interfaces/interface/state/admin-status
    mode: stream
    stream-mode: sample
    sample-interval: 10s
  
  # OpenConfig BGP basic state - vendor agnostic
  oc_bgp_neighbors:
    paths:
      - /network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state
    mode: stream
    stream-mode: sample
    sample-interval: 30s
  
  # SR Linux native for OSPF (poor OpenConfig support)
  srl_ospf_state:
    paths:
      - /network-instance[name=default]/protocols/ospf
    mode: stream
    stream-mode: sample
    sample-interval: 30s
  
  # SR Linux native for detailed BGP (includes EVPN)
  srl_bgp_detailed:
    paths:
      - /network-instance[name=default]/protocols/bgp
    mode: stream
    stream-mode: sample
    sample-interval: 30s
  
  # OpenConfig LLDP - good cross-vendor support
  oc_lldp:
    paths:
      - /lldp/interfaces/interface/neighbors/neighbor/state
    mode: stream
    stream-mode: sample
    sample-interval: 60s

processors:
  # Normalize interface metrics to network_interface_* format (SR Linux + Arista)
  normalize_interface_metrics:
    event-processors:
      # Transform /interface/statistics/in-octets to network_interface_in_octets (SR Linux)
      - event-convert:
          value-names:
            - "^/srl_nokia/interface/statistics/in-octets$"
            - "^/interface/statistics/in-octets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/srl_nokia/interface/statistics/in-octets"
                new: "network_interface_in_octets"
            - replace:
                apply-on: "name"
                old: "/interface/statistics/in-octets"
                new: "network_interface_in_octets"
      
      # Transform OpenConfig interface counters to network_interface_in_octets (Arista)
      - event-convert:
          value-names:
            - "^/interfaces/interface/state/counters/in-octets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/interfaces/interface/state/counters/in-octets"
                new: "network_interface_in_octets"
      
      # Transform /interface/statistics/out-octets to network_interface_out_octets (SR Linux)
      - event-convert:
          value-names:
            - "^/srl_nokia/interface/statistics/out-octets$"
            - "^/interface/statistics/out-octets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/srl_nokia/interface/statistics/out-octets"
                new: "network_interface_out_octets"
            - replace:
                apply-on: "name"
                old: "/interface/statistics/out-octets"
                new: "network_interface_out_octets"
      
      # Transform OpenConfig interface counters to network_interface_out_octets (Arista)
      - event-convert:
          value-names:
            - "^/interfaces/interface/state/counters/out-octets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/interfaces/interface/state/counters/out-octets"
                new: "network_interface_out_octets"
      
      # Transform /interface/statistics/in-packets to network_interface_in_packets (SR Linux)
      - event-convert:
          value-names:
            - "^/srl_nokia/interface/statistics/in-packets$"
            - "^/interface/statistics/in-packets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/srl_nokia/interface/statistics/in-packets"
                new: "network_interface_in_packets"
            - replace:
                apply-on: "name"
                old: "/interface/statistics/in-packets"
                new: "network_interface_in_packets"
      
      # Transform OpenConfig interface counters to network_interface_in_packets (Arista)
      - event-convert:
          value-names:
            - "^/interfaces/interface/state/counters/in-pkts$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/interfaces/interface/state/counters/in-pkts"
                new: "network_interface_in_packets"
      
      # Transform /interface/statistics/out-packets to network_interface_out_packets (SR Linux)
      - event-convert:
          value-names:
            - "^/srl_nokia/interface/statistics/out-packets$"
            - "^/interface/statistics/out-packets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/srl_nokia/interface/statistics/out-packets"
                new: "network_interface_out_packets"
            - replace:
                apply-on: "name"
                old: "/interface/statistics/out-packets"
                new: "network_interface_out_packets"
      
      # Transform OpenConfig interface counters to network_interface_out_packets (Arista)
      - event-convert:
          value-names:
            - "^/interfaces/interface/state/counters/out-pkts$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/interfaces/interface/state/counters/out-pkts"
                new: "network_interface_out_packets"
      
      # Transform /interface/statistics/in-errors to network_interface_in_errors (SR Linux)
      - event-convert:
          value-names:
            - "^/srl_nokia/interface/statistics/in-errors$"
            - "^/interface/statistics/in-errors$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/srl_nokia/interface/statistics/in-errors"
                new: "network_interface_in_errors"
            - replace:
                apply-on: "name"
                old: "/interface/statistics/in-errors"
                new: "network_interface_in_errors"
      
      # Transform OpenConfig interface counters to network_interface_in_errors (Arista)
      - event-convert:
          value-names:
            - "^/interfaces/interface/state/counters/in-errors$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/interfaces/interface/state/counters/in-errors"
                new: "network_interface_in_errors"
      
      # Transform /interface/statistics/out-errors to network_interface_out_errors (SR Linux)
      - event-convert:
          value-names:
            - "^/srl_nokia/interface/statistics/out-errors$"
            - "^/interface/statistics/out-errors$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/srl_nokia/interface/statistics/out-errors"
                new: "network_interface_out_errors"
            - replace:
                apply-on: "name"
                old: "/interface/statistics/out-errors"
                new: "network_interface_out_errors"
      
      # Transform OpenConfig interface counters to network_interface_out_errors (Arista)
      - event-convert:
          value-names:
            - "^/interfaces/interface/state/counters/out-errors$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/interfaces/interface/state/counters/out-errors"
                new: "network_interface_out_errors"
      
      # SONiC interface counters (OpenConfig paths)
      # SONiC uses the same OpenConfig paths as Arista, so these are already covered above
      # But we add explicit SONiC native path support for completeness
      
      # Transform SONiC native interface counters to network_interface_in_octets
      - event-convert:
          value-names:
            - "^/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-octets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-octets"
                new: "network_interface_in_octets"
      
      # Transform SONiC native interface counters to network_interface_out_octets
      - event-convert:
          value-names:
            - "^/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-octets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-octets"
                new: "network_interface_out_octets"
      
      # Transform SONiC native interface counters to network_interface_in_packets
      - event-convert:
          value-names:
            - "^/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-pkts$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-pkts"
                new: "network_interface_in_packets"
      
      # Transform SONiC native interface counters to network_interface_out_packets
      - event-convert:
          value-names:
            - "^/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-pkts$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-pkts"
                new: "network_interface_out_packets"
      
      # Transform SONiC native interface counters to network_interface_in_errors
      - event-convert:
          value-names:
            - "^/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-errors$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-errors"
                new: "network_interface_in_errors"
      
      # Transform SONiC native interface counters to network_interface_out_errors
      - event-convert:
          value-names:
            - "^/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-errors$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-errors"
                new: "network_interface_out_errors"
      
      # Juniper interface counters (OpenConfig and native paths)
      # Juniper uses OpenConfig paths which are already covered above
      # Add Juniper native path support for completeness
      
      # Transform Juniper native interface counters to network_interface_in_octets
      - event-convert:
          value-names:
            - "^/junos/system/linecard/interface/logical/usage/in-octets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/system/linecard/interface/logical/usage/in-octets"
                new: "network_interface_in_octets"
      
      # Transform Juniper native interface counters to network_interface_out_octets
      - event-convert:
          value-names:
            - "^/junos/system/linecard/interface/logical/usage/out-octets$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/system/linecard/interface/logical/usage/out-octets"
                new: "network_interface_out_octets"
      
      # Transform Juniper native interface counters to network_interface_in_packets
      - event-convert:
          value-names:
            - "^/junos/system/linecard/interface/logical/usage/in-pkts$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/system/linecard/interface/logical/usage/in-pkts"
                new: "network_interface_in_packets"
      
      # Transform Juniper native interface counters to network_interface_out_packets
      - event-convert:
          value-names:
            - "^/junos/system/linecard/interface/logical/usage/out-pkts$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/system/linecard/interface/logical/usage/out-pkts"
                new: "network_interface_out_packets"
      
      # Transform Juniper native interface counters to network_interface_in_errors
      - event-convert:
          value-names:
            - "^/junos/system/linecard/interface/logical/usage/in-errors$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/system/linecard/interface/logical/usage/in-errors"
                new: "network_interface_in_errors"
      
      # Transform Juniper native interface counters to network_interface_out_errors
      - event-convert:
          value-names:
            - "^/junos/system/linecard/interface/logical/usage/out-errors$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/system/linecard/interface/logical/usage/out-errors"
                new: "network_interface_out_errors"
      
      # Normalize interface name labels: ethernet-1/1 -> eth1_1 (SR Linux)
      # Normalize interface name labels: Ethernet1/1 -> eth1_1 (Arista)
      # Normalize interface name labels: Ethernet1 -> eth1_0 (Arista single port)
      # Normalize interface name labels: Ethernet0 -> eth0_0 (SONiC)
      # Normalize interface name labels: ge-0/0/0 -> eth0_0_0 (Juniper)
      - event-convert:
          tag-names:
            - "interface_name"
            - "interface"
          transforms:
            # Juniper: ge-0/0/0 -> eth0_0_0 (must come first to avoid partial matches)
            - replace:
                apply-on: "value"
                old: "^ge-(\\d+)/(\\d+)/(\\d+)$"
                new: "eth${1}_${2}_${3}"
            # SR Linux: ethernet-1/1 -> eth1_1
            - replace:
                apply-on: "value"
                old: "^ethernet-(\\d+)/(\\d+)$"
                new: "eth${1}_${2}"
            # Arista: Ethernet1/1 -> eth1_1
            - replace:
                apply-on: "value"
                old: "^Ethernet(\\d+)/(\\d+)$"
                new: "eth${1}_${2}"
            # Arista & SONiC: Ethernet1 or Ethernet0 -> eth1_0 or eth0_0
            - replace:
                apply-on: "value"
                old: "^Ethernet(\\d+)$"
                new: "eth${1}_0"
  
  # Normalize BGP metrics to network_bgp_* format (SR Linux + Arista)
  normalize_bgp_metrics:
    event-processors:
      # Transform BGP session state (SR Linux native)
      - event-convert:
          value-names:
            - "^/network-instance/protocols/bgp/neighbor/session-state$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/network-instance/protocols/bgp/neighbor/session-state"
                new: "network_bgp_session_state"
      
      # Transform BGP session state (OpenConfig - Arista, SONiC, Juniper)
      - event-convert:
          value-names:
            - "^/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/session-state$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/session-state"
                new: "network_bgp_session_state"
      
      # Transform BGP peer AS (SR Linux native)
      - event-convert:
          value-names:
            - "^/network-instance/protocols/bgp/neighbor/peer-as$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/network-instance/protocols/bgp/neighbor/peer-as"
                new: "network_bgp_peer_as"
      
      # Transform BGP peer AS (OpenConfig - Arista)
      - event-convert:
          value-names:
            - "^/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/peer-as$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/peer-as"
                new: "network_bgp_peer_as"
      
      # Transform BGP received routes (SR Linux native)
      - event-convert:
          value-names:
            - "^/network-instance/protocols/bgp/neighbor/received-routes$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/network-instance/protocols/bgp/neighbor/received-routes"
                new: "network_bgp_received_routes"
      
      # Transform BGP received routes (OpenConfig - Arista)
      - event-convert:
          value-names:
            - "^/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi/state/received$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi/state/received"
                new: "network_bgp_received_routes"
      
      # Transform BGP sent routes (SR Linux native)
      - event-convert:
          value-names:
            - "^/network-instance/protocols/bgp/neighbor/sent-routes$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/network-instance/protocols/bgp/neighbor/sent-routes"
                new: "network_bgp_sent_routes"
      
      # Transform BGP sent routes (OpenConfig - Arista)
      - event-convert:
          value-names:
            - "^/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi/state/sent$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi/state/sent"
                new: "network_bgp_sent_routes"
      
      # SONiC BGP metrics (OpenConfig and native paths)
      # SONiC uses OpenConfig paths which are already covered above
      # Add SONiC native path support for completeness
      
      # Transform SONiC native BGP session state
      - event-convert:
          value-names:
            - "^/sonic-bgp:sonic-bgp/BGP_NEIGHBOR/state/session-state$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-bgp:sonic-bgp/BGP_NEIGHBOR/state/session-state"
                new: "network_bgp_session_state"
      
      # Transform SONiC native BGP established transitions
      - event-convert:
          value-names:
            - "^/sonic-bgp:sonic-bgp/BGP_NEIGHBOR/state/established-transitions$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-bgp:sonic-bgp/BGP_NEIGHBOR/state/established-transitions"
                new: "network_bgp_established_transitions"
      
      # Transform SONiC native BGP received routes
      - event-convert:
          value-names:
            - "^/sonic-bgp:sonic-bgp/BGP_NEIGHBOR/state/received-routes$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-bgp:sonic-bgp/BGP_NEIGHBOR/state/received-routes"
                new: "network_bgp_received_routes"
      
      # Transform SONiC native BGP sent routes
      - event-convert:
          value-names:
            - "^/sonic-bgp:sonic-bgp/BGP_NEIGHBOR/state/sent-routes$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/sonic-bgp:sonic-bgp/BGP_NEIGHBOR/state/sent-routes"
                new: "network_bgp_sent_routes"
      
      # Juniper BGP metrics (OpenConfig and native paths)
      # Juniper uses OpenConfig paths which are already covered above
      # Add Juniper native path support for completeness
      
      # Transform Juniper native BGP session state
      - event-convert:
          value-names:
            - "^/junos/routing/bgp/neighbor/state$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/routing/bgp/neighbor/state"
                new: "network_bgp_session_state"
      
      # Transform Juniper native BGP established transitions (flap-count)
      - event-convert:
          value-names:
            - "^/junos/routing/bgp/neighbor/flap-count$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/routing/bgp/neighbor/flap-count"
                new: "network_bgp_established_transitions"
      
      # Transform Juniper native BGP received routes
      - event-convert:
          value-names:
            - "^/junos/routing/bgp/neighbor/received-routes$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/routing/bgp/neighbor/received-routes"
                new: "network_bgp_received_routes"
      
      # Transform Juniper native BGP sent routes (advertised-routes)
      - event-convert:
          value-names:
            - "^/junos/routing/bgp/neighbor/advertised-routes$"
          transforms:
            - replace:
                apply-on: "name"
                old: "/junos/routing/bgp/neighbor/advertised-routes"
                new: "network_bgp_sent_routes"
      
      # Normalize BGP state values to uppercase
      - event-convert:
          tag-names:
            - "session_state"
            - "state"
          transforms:
            - replace:
                apply-on: "value"
                old: "established"
                new: "ESTABLISHED"
            - replace:
                apply-on: "value"
                old: "idle"
                new: "IDLE"
            - replace:
                apply-on: "value"
                old: "connect"
                new: "CONNECT"
            - replace:
                apply-on: "value"
                old: "active"
                new: "ACTIVE"
  
  # Add vendor labels to all metrics (detects SR Linux and Arista)
  add_vendor_tags:
    event-processors:
      # Detect and tag SR Linux devices
      - event-add-tag:
          tag-name: vendor
          value: "nokia"
          condition: 'contains(source, "spine") || contains(source, "leaf")'
      
      - event-add-tag:
          tag-name: os
          value: "srlinux"
          condition: 'contains(source, "spine") || contains(source, "leaf")'
      
      # Detect and tag Arista devices (when added to topology)
      - event-add-tag:
          tag-name: vendor
          value: "arista"
          condition: 'contains(source, "arista") || contains(source, "eos")'
      
      - event-add-tag:
          tag-name: os
          value: "eos"
          condition: 'contains(source, "arista") || contains(source, "eos")'
      
      # Detect and tag SONiC devices (Dell EMC)
      - event-add-tag:
          tag-name: vendor
          value: "dellemc"
          condition: 'contains(source, "sonic") || contains(source, "dell")'
      
      - event-add-tag:
          tag-name: os
          value: "sonic"
          condition: 'contains(source, "sonic") || contains(source, "dell")'
      
      # Detect and tag Juniper devices
      - event-add-tag:
          tag-name: vendor
          value: "juniper"
          condition: 'contains(source, "juniper") || contains(source, "junos") || contains(source, "vmx") || contains(source, "crpd")'
      
      - event-add-tag:
          tag-name: os
          value: "junos"
          condition: 'contains(source, "juniper") || contains(source, "junos") || contains(source, "vmx") || contains(source, "crpd")'
      
      # Mark universal metrics
      - event-add-tag:
          tag-name: universal_metric
          value: "true"
          condition: "contains(name, 'network_')"
      
      # Mark vendor-specific metrics
      - event-add-tag:
          tag-name: vendor_metric
          value: "true"
          condition: "!contains(name, 'network_')"

outputs:
  prom:
    type: prometheus
    listen: :9273
    path: /metrics
    metric-prefix: gnmic
    append-subscription-name: true
    export-timestamps: true
    strings-as-labels: true
    event-processors:
      - normalize_interface_metrics
      - normalize_bgp_metrics
      - add_vendor_tags
