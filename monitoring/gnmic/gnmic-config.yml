username: admin
password: NokiaSrl1!
skip-verify: true
encoding: json_ietf

targets:
  spine1:
    address: clab-gnmi-clos-spine1:57400
  spine2:
    address: clab-gnmi-clos-spine2:57400
  leaf1:
    address: clab-gnmi-clos-leaf1:57400
  leaf2:
    address: clab-gnmi-clos-leaf2:57400
  leaf3:
    address: clab-gnmi-clos-leaf3:57400
  leaf4:
    address: clab-gnmi-clos-leaf4:57400

subscriptions:
  # OpenConfig interface stats - works across vendors
  oc_interface_stats:
    paths:
      - /interfaces/interface/state/counters
      - /interfaces/interface/state/oper-status
      - /interfaces/interface/state/admin-status
    mode: stream
    stream-mode: sample
    sample-interval: 10s

  # OpenConfig BGP state - vendor agnostic
  oc_bgp_neighbors:
    paths:
      - /network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state
    mode: stream
    stream-mode: sample
    sample-interval: 30s

  # OpenConfig LLDP - good cross-vendor support
  oc_lldp:
    paths:
      - /lldp/interfaces/interface/neighbors/neighbor/state
    mode: stream
    stream-mode: sample
    sample-interval: 60s

  # SR Linux native OSPF - vendor specific (SR Linux doesn't expose OSPF via OpenConfig)
  srl_ospf:
    paths:
      - srl_nokia:/network-instance[name=default]/protocols/ospf/instance[name=main]/area[area-id=0.0.0.0]/interface/neighbor/adjacency-state
      - srl_nokia:/network-instance[name=default]/protocols/ospf/instance[name=main]/area[area-id=0.0.0.0]/interface/neighbor/retransmission-queue-length
    mode: stream
    stream-mode: sample
    sample-interval: 30s

  # SR Linux native EVPN - vendor specific (SR Linux doesn't expose EVPN via OpenConfig)
  srl_evpn:
    paths:
      - srl_nokia:/network-instance/protocols/bgp-evpn/bgp-instance/oper-state
      - srl_nokia:/network-instance/protocols/bgp-evpn/bgp-instance/evi
      - srl_nokia:/network-instance/protocols/bgp-evpn/bgp-instance/ecmp
    mode: stream
    stream-mode: sample
    sample-interval: 30s

  # SR Linux native VXLAN - vendor specific
  srl_vxlan:
    paths:
      - srl_nokia:/tunnel-interface[name=vxlan1]/vxlan-interface/oper-state
      - srl_nokia:/tunnel-interface[name=vxlan1]/vxlan-interface/index
      - srl_nokia:/tunnel-interface[name=vxlan1]/vxlan-interface/bridge-table/statistics
      - srl_nokia:/tunnel-interface[name=vxlan1]/vxlan-interface/bridge-table/multicast-destinations/multicast-limit
    mode: stream
    stream-mode: sample
    sample-interval: 30s

  # OpenConfig QoS queue statistics - vendor agnostic
  oc_qos_queues:
    paths:
      - /qos/interfaces/interface/output/queues/queue/state
    mode: stream
    stream-mode: sample
    sample-interval: 10s

processors:
  normalize-oc-interfaces:
    event-strings:
      value-names:
        - ".*"
      transforms:
        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_octets"
            new: "network_interface_in_octets"
        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_octets"
            new: "network_interface_out_octets"
        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_pkts"
            new: "network_interface_in_packets"
        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_pkts"
            new: "network_interface_out_packets"
        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_errors"
            new: "network_interface_in_errors"
        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_errors"
            new: "network_interface_out_errors"
        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_discards"
            new: "network_interface_in_discards"
        - replace:
            apply-on: "name"
