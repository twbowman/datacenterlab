            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_unicast_pkts"
            new: "network_interface_in_unicast_packets"
        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_out_unicast_pkts"
