  tag-srl-vxlan:
    event-add-tag:
      condition:
        value-names:
          - "^network_vxlan_.*"
      add:
        vendor: nokia

outputs:
  prom:
    type: prometheus
    listen: :9273
    path: /metrics
    metric-prefix: gnmic
    append-subscription-name: true
    export-timestamps: true
    strings-as-labels: true
    event-processors:
      # Tier 1: OpenConfig
      - normalize-oc-interfaces
      - normalize-oc-bgp
      - normalize-oc-lldp
      - normalize-oc-qos
      # Tier 2: SR Linux native
      - normalize-srl-ospf
      - tag-srl-ospf
      - normalize-srl-evpn
      - tag-srl-evpn
      - normalize-srl-vxlan
      - tag-srl-vxlan
