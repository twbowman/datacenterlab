        - replace:
            apply-on: "name"
            old: "gnmic_oc_interface_stats_openconfig_interfaces_interfaces_interface_state_counters_in_broadcast_pkts"
            new: "network_interface_in_broadcast_packets"
        - replace:
            apply-on: "name"
