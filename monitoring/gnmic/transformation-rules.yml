# Metric Transformation Rules
#
# This file defines the actual transformation rules used by gNMIc processors
# and Prometheus relabeling to normalize metrics across vendors.
#
# Purpose: Transform vendor-specific metric names, values, and labels to
#          universal OpenConfig-based normalized metrics
#
# Requirements: 4.1, 4.2, 4.5
#
# Usage:
#   1. Import this file in gNMIc configuration: processors section
#   2. Import Prometheus rules in prometheus.yml: metric_relabel_configs
#   3. Reference when troubleshooting metric normalization issues
#
# Related Files:
#   - normalization-mappings.yml: Documentation of vendor path mappings
#   - gnmic-config.yml: Main gNMIc configuration
#   - prometheus.yml: Prometheus configuration with relabeling

---
# =============================================================================
# VALUE TRANSFORMATIONS
# =============================================================================
# Define how metric values should be transformed (units, scales, conversions)

value_transformations:
  description: "Rules for transforming metric values to consistent units and scales"

  # Interface bandwidth: Convert to bits per second
  interface_bandwidth:
    description: "Convert octets to bits for bandwidth calculations"
    transformation: "multiply by 8"
    applies_to:
      - network_interface_in_octets
      - network_interface_out_octets
    notes: |
      Most network engineers think in bits/sec, not bytes/sec.
      Grafana queries should use: rate(network_interface_in_octets[5m]) * 8

  # BGP session state: Normalize state values
  bgp_session_state:
    description: "Map vendor-specific BGP state values to OpenConfig standard"
    transformation: "map string to integer"
    mapping:
      IDLE: 1
      CONNECT: 2
      ACTIVE: 3
      OPENSENT: 4
      OPENCONFIRM: 5
      ESTABLISHED: 6
    applies_to:
      - network_bgp_session_state
    notes: |
      OpenConfig defines BGP states as integers:
      1=IDLE, 2=CONNECT, 3=ACTIVE, 4=OPENSENT, 5=OPENCONFIRM, 6=ESTABLISHED
      Some vendors use strings, others use integers - normalize to integers

  # OSPF neighbor state: Normalize state values
  ospf_neighbor_state:
    description: "Map vendor-specific OSPF state values to standard integers"
    transformation: "map string to integer"
    mapping:
      DOWN: 1
      ATTEMPT: 2
      INIT: 3
      "2WAY": 4
      EXSTART: 5
      EXCHANGE: 6
      LOADING: 7
      FULL: 8
    applies_to:
      - network_ospf_neighbor_state
    notes: |
      OSPF RFC 2328 defines neighbor states as:
      1=Down, 2=Attempt, 3=Init, 4=2-Way, 5=ExStart, 6=Exchange, 7=Loading, 8=Full

  # Timestamps: Ensure consistent format
  timestamps:
    description: "Convert all timestamps to Unix epoch (seconds since 1970-01-01)"
    transformation: "convert to unix epoch"
    applies_to:
      - network_bgp_last_established
      - network_lldp_neighbor_last_update
    notes: |
      Some vendors use ISO 8601, others use Unix epoch.
      Normalize to Unix epoch for Prometheus compatibility.

  # Percentages: Normalize to 0-100 scale
  percentages:
    description: "Ensure all percentage values are in 0-100 range"
    transformation: "convert to 0-100 scale"
    applies_to:
      - network_cpu_utilization
      - network_memory_utilization
    notes: |
      Some vendors report 0-1 (0.85 = 85%), others 0-100.
      Normalize to 0-100 for consistency.

  # Timers: Convert to seconds
  timers:
    description: "Convert all timer values to seconds"
    transformation: "convert to seconds"
    applies_to:
      - network_bgp_keepalive_interval
      - network_ospf_neighbor_dead_timer
      - network_ospf_hello_interval
    notes: |
      Some vendors use milliseconds, others seconds.
      Normalize to seconds for consistency.

# =============================================================================
# LABEL TRANSFORMATIONS
# =============================================================================
# Define how metric labels should be transformed (interface names, states, etc.)

label_transformations:
  description: "Rules for transforming metric labels to consistent formats"

  # Interface name normalization
  interface_names:
    description: "Normalize interface names across vendors"
    transformation: "regex replace"
    rules:
      # SR Linux: ethernet-1/1 -> eth1_1
      sr_linux:
        pattern: "^ethernet-(\\d+)/(\\d+)$"
        replacement: "eth${1}_${2}"
        examples:
          - input: "ethernet-1/1"
            output: "eth1_1"
          - input: "ethernet-1/49"
            output: "eth1_49"

      # Arista: Ethernet1/1 -> eth1_1
      arista:
        pattern: "^Ethernet(\\d+)/(\\d+)$"
        replacement: "eth${1}_${2}"
        examples:
          - input: "Ethernet1/1"
            output: "eth1_1"
          - input: "Ethernet49/1"
            output: "eth49_1"

      # Arista: Ethernet1 -> eth1_0
      arista_single:
        pattern: "^Ethernet(\\d+)$"
        replacement: "eth${1}_0"
        examples:
          - input: "Ethernet1"
            output: "eth1_0"

      # SONiC: Ethernet0 -> eth0_0
      sonic:
        pattern: "^Ethernet(\\d+)$"
        replacement: "eth${1}_0"
        examples:
          - input: "Ethernet0"
            output: "eth0_0"
          - input: "Ethernet48"
            output: "eth48_0"

      # Juniper: ge-0/0/0 -> eth0_0_0
      juniper:
        pattern: "^ge-(\\d+)/(\\d+)/(\\d+)$"
        replacement: "eth${1}_${2}_${3}"
        examples:
          - input: "ge-0/0/0"
            output: "eth0_0_0"
          - input: "ge-0/0/47"
            output: "eth0_0_47"

      # Management interfaces: keep as-is
      management:
        pattern: "^(mgmt|Management|ma1).*$"
        replacement: "mgmt0"
        examples:
          - input: "mgmt0"
            output: "mgmt0"
          - input: "Management1"
            output: "mgmt0"

    applies_to:
      - interface label in all network_interface_* metrics
      - interface label in network_lldp_* metrics
      - interface label in network_ospf_interface_* metrics

    notes: |
      Interface name normalization enables universal queries like:
        network_interface_in_octets{interface="eth1_1"}
      This works across all vendors regardless of native naming.

  # BGP session state labels
  bgp_state_labels:
    description: "Normalize BGP state string representations"
    transformation: "string normalization"
    rules:
      uppercase: "Convert all state strings to UPPERCASE"
      trim: "Remove leading/trailing whitespace"
      mapping:
        established: "ESTABLISHED"
        idle: "IDLE"
        connect: "CONNECT"
        active: "ACTIVE"
        opensent: "OPENSENT"
        openconfirm: "OPENCONFIRM"
    applies_to:
      - state label in network_bgp_session_state
    notes: |
      Ensures consistent state representation across vendors.
      Grafana queries can reliably filter: {state="ESTABLISHED"}

  # Device role labels
  device_role:
    description: "Standardize device role labels"
    transformation: "string normalization"
    rules:
      lowercase: "Convert all role strings to lowercase"
      allowed_values:
        - spine
        - leaf
        - border
        - superspine
        - tor
        - aggregation
    applies_to:
      - role label in all metrics
    notes: |
      Device roles should be set in gNMIc target configuration.
      Enables queries like: network_interface_in_octets{role="spine"}

  # Vendor labels
  vendor_labels:
    description: "Standardize vendor identification labels"
    transformation: "string normalization"
    rules:
      lowercase: "Convert vendor names to lowercase"
      mapping:
        Nokia: "nokia"
        Arista: "arista"
        "Dell EMC": "dellemc"
        Juniper: "juniper"
    applies_to:
      - vendor label in all metrics
    notes: |
      Vendor labels enable filtering and comparison:
        network_interface_in_octets{vendor="nokia"}
        network_bgp_session_state{vendor=~"nokia|arista"}

# =============================================================================
# VENDOR PREFIX FOR NATIVE METRICS
# =============================================================================
# Define vendor prefixes for metrics without OpenConfig equivalents

vendor_prefixes:
  description: "Prefix native-only metrics with vendor identifier"
  requirement: "Requirement 4.5 - preserve native metrics with vendor prefix"

  prefix_format: "vendor_{vendor}_{metric_name}"

  examples:
    sr_linux_native:
      description: "SR Linux native metrics without OpenConfig equivalent"
      metrics:
        - original: "srl_system_app_memory_usage"
          normalized: "vendor_nokia_system_app_memory_usage"
        - original: "srl_network_instance_vxlan_vtep_count"
          normalized: "vendor_nokia_network_instance_vxlan_vtep_count"
        - original: "srl_bgp_evpn_route_type_2_count"
          normalized: "vendor_nokia_bgp_evpn_route_type_2_count"

    arista_native:
      description: "Arista native metrics without OpenConfig equivalent"
      metrics:
        - original: "eos_hardware_temperature_sensor"
          normalized: "vendor_arista_hardware_temperature_sensor"
        - original: "eos_vxlan_flood_list_count"
          normalized: "vendor_arista_vxlan_flood_list_count"
        - original: "eos_mlag_peer_link_status"
          normalized: "vendor_arista_mlag_peer_link_status"

    sonic_native:
      description: "SONiC native metrics without OpenConfig equivalent"
      metrics:
        - original: "sonic_buffer_pool_usage"
          normalized: "vendor_dellemc_buffer_pool_usage"
        - original: "sonic_queue_watermark"
          normalized: "vendor_dellemc_queue_watermark"
        - original: "sonic_pfc_pause_frames"
          normalized: "vendor_dellemc_pfc_pause_frames"

    juniper_native:
      description: "Juniper native metrics without OpenConfig equivalent"
      metrics:
        - original: "junos_firewall_filter_counter"
          normalized: "vendor_juniper_firewall_filter_counter"
        - original: "junos_cos_queue_stats"
          normalized: "vendor_juniper_cos_queue_stats"
        - original: "junos_chassis_temperature"
          normalized: "vendor_juniper_chassis_temperature"

  implementation:
    gnmic_processor: |
      processors:
        add_vendor_prefix:
          event-processors:
            - event-add-tag:
                tag-name: vendor_metric
                value: "true"
                condition: "!contains(name, 'network_')"
            - event-convert:
                value-names:
                  - "^srl_.*$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "^srl_"
                      new: "vendor_nokia_"
            - event-convert:
                value-names:
                  - "^eos_.*$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "^eos_"
                      new: "vendor_arista_"

    prometheus_relabeling: |
      metric_relabel_configs:
        # Add vendor_metric label for native metrics
        - source_labels: [__name__]
          regex: 'vendor_.*'
          target_label: vendor_metric
          replacement: 'true'

  notes: |
    Native metrics are preserved with vendor prefix to:
    1. Avoid naming conflicts between vendors
    2. Clearly identify vendor-specific metrics
    3. Enable vendor-specific dashboards and queries
    4. Maintain access to advanced vendor features

    Query examples:
      # All native Nokia metrics
      {__name__=~"vendor_nokia_.*"}

      # Native metrics from all vendors
      {vendor_metric="true"}

      # Exclude native metrics (universal only)
      {vendor_metric!="true"}

# =============================================================================
# GNMIC PROCESSOR CONFIGURATION
# =============================================================================
# Complete gNMIc processor configuration implementing all transformation rules

gnmic_processors:
  description: "gNMIc event processors for metric normalization"

  # Processor 1: Normalize interface metrics
  normalize_interface_metrics:
    description: "Transform vendor interface paths to network_interface_* metrics"
    config: |
      processors:
        normalize_interface_metrics:
          event-processors:
            # SR Linux interface counters
            - event-convert:
                value-names:
                  - "^/srl_nokia/interface/statistics/in-octets$"
                  - "^/interface/statistics/in-octets$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/srl_nokia/interface/statistics/in-octets"
                      new: "network_interface_in_octets"
                  - replace:
                      apply-on: "name"
                      old: "/interface/statistics/in-octets"
                      new: "network_interface_in_octets"

            - event-convert:
                value-names:
                  - "^/srl_nokia/interface/statistics/out-octets$"
                  - "^/interface/statistics/out-octets$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/srl_nokia/interface/statistics/out-octets"
                      new: "network_interface_out_octets"
                  - replace:
                      apply-on: "name"
                      old: "/interface/statistics/out-octets"
                      new: "network_interface_out_octets"

            # Arista interface counters (OpenConfig path)
            - event-convert:
                value-names:
                  - "^/interfaces/interface/state/counters/in-octets$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/interfaces/interface/state/counters/in-octets"
                      new: "network_interface_in_octets"

            - event-convert:
                value-names:
                  - "^/interfaces/interface/state/counters/out-octets$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/interfaces/interface/state/counters/out-octets"
                      new: "network_interface_out_octets"

            # Normalize interface name labels
            - event-convert:
                tag-names:
                  - "interface_name"
                  - "interface"
                transforms:
                  # SR Linux: ethernet-1/1 -> eth1_1
                  - replace:
                      apply-on: "value"
                      old: "^ethernet-(\\d+)/(\\d+)$"
                      new: "eth${1}_${2}"
                  # Arista: Ethernet1/1 -> eth1_1
                  - replace:
                      apply-on: "value"
                      old: "^Ethernet(\\d+)/(\\d+)$"
                      new: "eth${1}_${2}"
                  # Arista: Ethernet1 -> eth1_0
                  - replace:
                      apply-on: "value"
                      old: "^Ethernet(\\d+)$"
                      new: "eth${1}_0"
                  # SONiC: Ethernet0 -> eth0_0
                  - replace:
                      apply-on: "value"
                      old: "^Ethernet(\\d+)$"
                      new: "eth${1}_0"
                  # Juniper: ge-0/0/0 -> eth0_0_0
                  - replace:
                      apply-on: "value"
                      old: "^ge-(\\d+)/(\\d+)/(\\d+)$"
                      new: "eth${1}_${2}_${3}"

  # Processor 2: Normalize BGP metrics
  normalize_bgp_metrics:
    description: "Transform vendor BGP paths to network_bgp_* metrics"
    config: |
      processors:
        normalize_bgp_metrics:
          event-processors:
            # SR Linux BGP session state
            - event-convert:
                value-names:
                  - "^/network-instance/protocols/bgp/neighbor/session-state$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/network-instance/protocols/bgp/neighbor/session-state"
                      new: "network_bgp_session_state"

            # OpenConfig BGP session state (Arista, SONiC, Juniper)
            - event-convert:
                value-names:
                  - "^/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/session-state$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/session-state"
                      new: "network_bgp_session_state"

            # Normalize BGP state values to integers
            - event-convert:
                value-names:
                  - "network_bgp_session_state"
                transforms:
                  - replace:
                      apply-on: "value"
                      old: "IDLE"
                      new: "1"
                  - replace:
                      apply-on: "value"
                      old: "CONNECT"
                      new: "2"
                  - replace:
                      apply-on: "value"
                      old: "ACTIVE"
                      new: "3"
                  - replace:
                      apply-on: "value"
                      old: "OPENSENT"
                      new: "4"
                  - replace:
                      apply-on: "value"
                      old: "OPENCONFIRM"
                      new: "5"
                  - replace:
                      apply-on: "value"
                      old: "ESTABLISHED"
                      new: "6"

  # Processor 3: Normalize LLDP metrics
  normalize_lldp_metrics:
    description: "Transform vendor LLDP paths to network_lldp_* metrics"
    config: |
      processors:
        normalize_lldp_metrics:
          event-processors:
            # SR Linux LLDP
            - event-convert:
                value-names:
                  - "^/system/lldp/interface/neighbor/system-name$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/system/lldp/interface/neighbor/system-name"
                      new: "network_lldp_neighbor_system_name"

            # OpenConfig LLDP (all vendors)
            - event-convert:
                value-names:
                  - "^/lldp/interfaces/interface/neighbors/neighbor/state/system-name$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/lldp/interfaces/interface/neighbors/neighbor/state/system-name"
                      new: "network_lldp_neighbor_system_name"

            - event-convert:
                value-names:
                  - "^/lldp/interfaces/interface/neighbors/neighbor/state/port-id$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/lldp/interfaces/interface/neighbors/neighbor/state/port-id"
                      new: "network_lldp_neighbor_port_id"

  # Processor 4: Add vendor prefix to native metrics
  add_vendor_prefix:
    description: "Prefix native-only metrics with vendor identifier"
    config: |
      processors:
        add_vendor_prefix:
          event-processors:
            # Mark native metrics
            - event-add-tag:
                tag-name: vendor_metric
                value: "true"
                condition: "!contains(name, 'network_')"

            # Add Nokia prefix
            - event-convert:
                value-names:
                  - "^srl_.*$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "^srl_"
                      new: "vendor_nokia_"

            # Add Arista prefix
            - event-convert:
                value-names:
                  - "^eos_.*$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "^eos_"
                      new: "vendor_arista_"

            # Add SONiC prefix
            - event-convert:
                value-names:
                  - "^sonic_.*$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "^sonic_"
                      new: "vendor_dellemc_"

            # Add Juniper prefix
            - event-convert:
                value-names:
                  - "^junos_.*$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "^junos_"
                      new: "vendor_juniper_"

  # Processor 5: Add standard tags
  add_standard_tags:
    description: "Add standard tags to all metrics"
    config: |
      processors:
        add_standard_tags:
          event-processors:
            # Add metric_type tag
            - event-add-tag:
                tag-name: metric_type
                value: "interface"
                condition: "contains(name, 'interface')"

            - event-add-tag:
                tag-name: metric_type
                value: "bgp"
                condition: "contains(name, 'bgp')"

            - event-add-tag:
                tag-name: metric_type
                value: "lldp"
                condition: "contains(name, 'lldp')"

            - event-add-tag:
                tag-name: metric_type
                value: "ospf"
                condition: "contains(name, 'ospf')"

            # Normalize vendor tag
            - event-convert:
                tag-names:
                  - "vendor"
                transforms:
                  - replace:
                      apply-on: "value"
                      old: "Nokia"
                      new: "nokia"
                  - replace:
                      apply-on: "value"
                      old: "Arista"
                      new: "arista"
                  - replace:
                      apply-on: "value"
                      old: "Dell EMC"
                      new: "dellemc"
                  - replace:
                      apply-on: "value"
                      old: "Juniper"
                      new: "juniper"

# =============================================================================
# PROMETHEUS RELABELING RULES
# =============================================================================
# Prometheus metric_relabel_configs for additional normalization

prometheus_relabeling:
  description: "Prometheus relabeling rules for metric normalization"

  config: |
    scrape_configs:
      - job_name: 'gnmic'
        static_configs:
          - targets: ['gnmic:9273']

        metric_relabel_configs:
          # Drop metrics with empty values
          - source_labels: [__name__]
            regex: '.*'
            action: drop
            target_label: __name__
            replacement: ''
            # Only if value is empty or null

          # Normalize interface label name
          - source_labels: [interface_name]
            target_label: interface
            regex: '(.+)'
            replacement: '${1}'

          # Add normalized_interface label (keep original)
          - source_labels: [interface]
            target_label: interface_normalized
            regex: '(.+)'
            replacement: '${1}'

          # Add device_type label if missing (from source)
          - source_labels: [source]
            target_label: device_type
            regex: '(spine|leaf|border).*'
            replacement: '${1}'

          # Ensure vendor label is lowercase
          - source_labels: [vendor]
            target_label: vendor
            regex: '([A-Z].*)'
            replacement: '${1}'
            action: lowercase

          # Add universal_metric label
          - source_labels: [__name__]
            target_label: universal_metric
            regex: 'network_.*'
            replacement: 'true'

          - source_labels: [__name__]
            target_label: universal_metric
            regex: 'vendor_.*'
            replacement: 'false'

          # Drop internal gNMIc metrics
          - source_labels: [__name__]
            regex: 'gnmic_.*_(subscriptions|targets|outputs).*'
            action: drop

# =============================================================================
# VALIDATION AND TESTING
# =============================================================================

validation:
  description: "How to validate transformation rules are working correctly"

  test_interface_normalization:
    description: "Verify interface metrics are normalized"
    prometheus_query: |
      # Should return metrics from all vendors
      network_interface_in_octets

      # Should have normalized interface names
      network_interface_in_octets{interface=~"eth.*"}

      # Should have vendor tags
      count(network_interface_in_octets) by (vendor)

    expected_result: |
      Metrics from all vendors (nokia, arista, dellemc, juniper)
      Interface names in format: eth1_1, eth1_49, etc.
      Vendor tag present on all metrics

  test_bgp_normalization:
    description: "Verify BGP metrics are normalized"
    prometheus_query: |
      # Should return BGP state as integer
      network_bgp_session_state

      # Count established sessions
      count(network_bgp_session_state == 6)

      # Sessions by vendor
      count(network_bgp_session_state) by (vendor)

    expected_result: |
      BGP state values are integers (1-6)
      6 = ESTABLISHED
      Metrics from all vendors

  test_vendor_prefix:
    description: "Verify native metrics have vendor prefix"
    prometheus_query: |
      # All native Nokia metrics
      {__name__=~"vendor_nokia_.*"}

      # All native metrics (any vendor)
      {vendor_metric="true"}

      # Count native metrics by vendor
      count({vendor_metric="true"}) by (vendor)

    expected_result: |
      Native metrics have vendor_ prefix
      vendor_metric="true" label present
      Native metrics separated by vendor

  test_label_normalization:
    description: "Verify labels are normalized"
    prometheus_query: |
      # Vendor labels should be lowercase
      network_interface_in_octets{vendor=~"[A-Z].*"}

      # Should return empty (no uppercase vendors)

    expected_result: |
      No results (all vendor labels are lowercase)
      Interface labels are normalized
      Device role labels are lowercase

# =============================================================================
# TROUBLESHOOTING
# =============================================================================

troubleshooting:
  description: "Common issues and solutions"

  metrics_not_normalized:
    symptom: "Metrics still have vendor-specific names"
    causes:
      - "gNMIc processors not configured"
      - "Processor order incorrect"
      - "Regex patterns don't match metric names"
    solutions:
      - "Check gNMIc logs for processor errors"
      - "Verify processor configuration in gnmic-config.yml"
      - "Test regex patterns with sample metric names"
      - "Ensure processors are applied to correct outputs"

  interface_names_not_normalized:
    symptom: "Interface labels still vendor-specific"
    causes:
      - "Interface name transformation not applied"
      - "Label name mismatch (interface vs interface_name)"
      - "Regex pattern doesn't match interface format"
    solutions:
      - "Check which label contains interface name"
      - "Update regex patterns for your interface format"
      - "Test with: network_interface_in_octets{interface=~\".*\"}"

  native_metrics_missing_prefix:
    symptom: "Native metrics don't have vendor_ prefix"
    causes:
      - "add_vendor_prefix processor not configured"
      - "Processor applied after metrics exported"
      - "Metric name pattern doesn't match"
    solutions:
      - "Verify processor order (should be early in chain)"
      - "Check metric name patterns in processor config"
      - "Test with: {__name__=~\"srl_.*|eos_.*|sonic_.*|junos_.*\"}"

  values_incorrect_after_transformation:
    symptom: "Metric values changed unexpectedly"
    causes:
      - "Value transformation applied incorrectly"
      - "Type conversion error (string to int)"
      - "Regex replacement affected value"
