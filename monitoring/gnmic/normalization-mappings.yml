          normalized: "network_interface_out_octets"

        in_packets:
          openconfig: "/interfaces/interface/state/counters/in-pkts"
          native: "/junos/.../in-pkts"
          normalized: "network_interface_in_packets"

        out_packets:
          openconfig: "/interfaces/interface/state/counters/out-pkts"
