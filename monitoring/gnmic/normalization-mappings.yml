# =============================================================================
# BGP METRICS
# =============================================================================
# BGP has good OpenConfig support for basic neighbor state
# Advanced features (RIB, EVPN) require vendor-specific paths

bgp_metrics:
  description: "BGP neighbor state, session statistics, and route counts"
  openconfig_support: "Good for basic state, limited for advanced features"
  # Normalized metric names (target output)
  normalized_metrics:
    - network_bgp_session_state
    - network_bgp_established_transitions
    - network_bgp_last_established
    - network_bgp_peer_as
    - network_bgp_local_as
    - network_bgp_enabled
    - network_bgp_neighbor_address
    - network_bgp_peer_group
    - network_bgp_peer_type
    - network_bgp_queues_input
    - network_bgp_queues_output
    - network_bgp_messages_received_update
    - network_bgp_messages_sent_update
    - network_bgp_messages_received_notification
    - network_bgp_messages_sent_notification
    - network_bgp_remove_private_as
    - network_bgp_supported_capabilities
    - network_bgp_last_notification_received
    - network_bgp_last_notification_sent

  # Vendor-specific paths and mappings
  vendors:
    sr_linux:
      openconfig_path: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state"
      native_path: "/network-instance[name=default]/protocols/bgp/neighbor"
      recommendation: "Use OpenConfig for basic state, native for EVPN details"

      mappings:
        session_state:
          openconfig: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/session-state"
          native: "/network-instance/protocols/bgp/neighbor/session-state"
          normalized: "network_bgp_session_state"
          notes: "Values: IDLE, CONNECT, ACTIVE, OPENSENT, OPENCONFIRM, ESTABLISHED"

        established_transitions:
          openconfig: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/established-transitions"
          native: "/network-instance/protocols/bgp/neighbor/statistics/established-transitions"
          normalized: "network_bgp_established_transitions"

        received_routes:
          openconfig: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi/state/received"
          native: "/network-instance/protocols/bgp/neighbor/received-routes"
          normalized: "network_bgp_received_routes"

        sent_routes:
          openconfig: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi/state/sent"
          native: "/network-instance/protocols/bgp/neighbor/sent-routes"
          normalized: "network_bgp_sent_routes"

        last_established:
          openconfig: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/last-established"
          native: "/network-instance/protocols/bgp/neighbor/last-established"
          normalized: "network_bgp_last_established"
    arista_eos:
      openconfig_path: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state"
      native_path: "/Sysdb/routing/bgp/export"
      recommendation: "Excellent OpenConfig support - use OpenConfig paths"

      mappings:
        session_state:
          openconfig: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/session-state"
          native: "/Sysdb/routing/bgp/export/*/peerStatus"
          normalized: "network_bgp_session_state"

        established_transitions:
          openconfig: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/established-transitions"
          native: "/Sysdb/routing/bgp/export/*/establishedTransitions"
