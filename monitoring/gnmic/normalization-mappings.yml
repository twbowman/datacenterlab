# =============================================================================
# OSPF METRICS
# =============================================================================
# OSPF has LIMITED OpenConfig support - vendor-specific paths recommended
# Use native paths for production deployments

ospf_metrics:
  description: "OSPF neighbor state, area information, and LSA statistics"
  openconfig_support: "Limited - recommend using vendor-specific paths"
  
  # Normalized metric names (target output)
  normalized_metrics:
    - network_ospf_neighbor_state
    - network_ospf_neighbor_priority
    - network_ospf_neighbor_dead_timer
    - network_ospf_area_lsa_count
    - network_ospf_interface_cost
    - network_ospf_interface_state
  
  # Vendor-specific paths and mappings
  vendors:
    sr_linux:
      openconfig_path: "/network-instances/network-instance/protocols/protocol/ospfv2"
      native_path: "/network-instance[name=default]/protocols/ospf"
      recommendation: "Use native path - better support and more detailed metrics"
      
      mappings:
        neighbor_state:
          openconfig: "/network-instances/network-instance/protocols/protocol/ospfv2/areas/area/interfaces/interface/neighbors/neighbor/state/state"
          native: "/network-instance/protocols/ospf/instance/area/interface/neighbor/adjacency-state"
          normalized: "network_ospf_neighbor_state"
          notes: "Values: DOWN, ATTEMPT, INIT, 2WAY, EXSTART, EXCHANGE, LOADING, FULL"
        
        neighbor_priority:
          openconfig: "/network-instances/network-instance/protocols/protocol/ospfv2/areas/area/interfaces/interface/neighbors/neighbor/state/priority"
          native: "/network-instance/protocols/ospf/instance/area/interface/neighbor/priority"
          normalized: "network_ospf_neighbor_priority"
        
        neighbor_dead_timer:
          openconfig: "/network-instances/network-instance/protocols/protocol/ospfv2/areas/area/interfaces/interface/neighbors/neighbor/state/dead-timer"
          native: "/network-instance/protocols/ospf/instance/area/interface/neighbor/dead-timer"
          normalized: "network_ospf_neighbor_dead_timer"
        
        area_lsa_count:
          openconfig: "Not available in OpenConfig"
          native: "/network-instance/protocols/ospf/instance/area/statistics/lsa-count"
          normalized: "network_ospf_area_lsa_count"
        
        interface_cost:
          openconfig: "/network-instances/network-instance/protocols/protocol/ospfv2/areas/area/interfaces/interface/state/metric"
          native: "/network-instance/protocols/ospf/instance/area/interface/metric"
          normalized: "network_ospf_interface_cost"
        
        interface_state:
          openconfig: "/network-instances/network-instance/protocols/protocol/ospfv2/areas/area/interfaces/interface/state/state"
          native: "/network-instance/protocols/ospf/instance/area/interface/oper-state"
          normalized: "network_ospf_interface_state"

    
    arista_eos:
      openconfig_path: "/network-instances/network-instance/protocols/protocol/ospfv2"
      native_path: "/Sysdb/routing/ospf/instance"
      recommendation: "Mixed - OpenConfig for basic state, native for detailed metrics"
      
      mappings:
        neighbor_state:
          openconfig: "/network-instances/network-instance/protocols/protocol/ospfv2/areas/area/interfaces/interface/neighbors/neighbor/state/state"
          native: "/Sysdb/routing/ospf/instance/*/neighbor/*/state"
          normalized: "network_ospf_neighbor_state"
        
        neighbor_priority:
          openconfig: "/network-instances/network-instance/protocols/protocol/ospfv2/areas/area/interfaces/interface/neighbors/neighbor/state/priority"
