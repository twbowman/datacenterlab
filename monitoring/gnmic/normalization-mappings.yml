# =============================================================================
# IMPLEMENTATION NOTES
# =============================================================================

implementation_notes:
  gNMIc_processors:
    description: "Use gNMIc event processors to transform vendor paths to normalized names"
    example: |
      processors:
        normalize_interface_metrics:
          event-processors:
            - event-convert:
                value-names:
                  - "^/srl_nokia/interface/statistics/in-octets$"
                transforms:
                  - replace:
                      apply-on: "name"
                      old: "/srl_nokia/interface/statistics/in-octets"
                      new: "interface_in_octets"
  
  prometheus_relabeling:
    description: "Use Prometheus metric_relabel_configs for additional normalization"
    example: |
      metric_relabel_configs:
        - source_labels: [__name__]
          regex: 'gnmic_srl_interface_stats_.*_in_octets'
          target_label: __name__
          replacement: 'network_interface_in_octets'

  
  grafana_queries:
    description: "Universal Grafana queries using normalized metric names"
    examples:
      interface_bandwidth: |
        # Works across all vendors
        rate(network_interface_in_octets[5m]) * 8
      
      bgp_session_status: |
        # Filter by vendor if needed
        network_bgp_session_state{vendor=~"nokia|arista|sonic|juniper"}
      
      lldp_neighbors: |
        # Universal topology query
        network_lldp_neighbor_system_name
      
      ospf_neighbor_count: |
        # Count OSPF neighbors per device
        count(network_ospf_neighbor_state == 8) by (source)
  
  vendor_tags:
    description: "All metrics include vendor tags for filtering and drill-down"
    required_tags:
      - vendor: "nokia, arista, dellemc, juniper"
      - os: "srlinux, eos, sonic, junos"
      - device_type: "spine, leaf, border, etc."
      - source: "device hostname"
    
    usage: |
      # Filter by vendor
      network_interface_in_octets{vendor="nokia"}
      
      # Filter by device type
      network_bgp_session_state{device_type="spine"}
      
      # Exclude specific vendor
      network_lldp_neighbor_system_name{vendor!="juniper"}

# =============================================================================
# TESTING AND VALIDATION
# =============================================================================

testing:
  verify_openconfig_support:
    description: "Test OpenConfig path support on each vendor"
    commands:
      sr_linux: |
        gnmic -a spine1:57400 -u admin -p NokiaSrl1! --insecure \
          get --path "/interfaces/interface[name=ethernet-1/1]/state/counters"
      
      arista_eos: |
        gnmic -a spine2:6030 -u admin -p admin --insecure \
          get --path "/interfaces/interface[name=Ethernet1]/state/counters"
      
      sonic: |
        gnmic -a leaf1:8080 -u admin -p admin --insecure \
          get --path "/interfaces/interface[name=Ethernet0]/state/counters"
      
      juniper: |
        gnmic -a leaf2:32767 -u admin -p admin --insecure \
          get --path "/interfaces/interface[name=ge-0/0/0]/state/counters"
  
  verify_normalization:
    description: "Verify normalized metrics appear in Prometheus"
    query: |
      # Check for normalized interface metrics
      curl 'http://prometheus:9090/api/v1/query?query=network_interface_in_octets'
      
      # Should return metrics from all vendors with vendor tags
      # Example result:
      # network_interface_in_octets{vendor="nokia",source="spine1",interface="ethernet-1-1"} 123456
      # network_interface_in_octets{vendor="arista",source="spine2",interface="Ethernet1"} 789012

# =============================================================================
# MIGRATION STRATEGY
# =============================================================================

migration_strategy:
  phase_1_openconfig_first:
    description: "Start with OpenConfig paths for maximum compatibility"
    metrics:
      - Interface counters (all vendors)
      - Basic BGP state (all vendors)
      - LLDP neighbors (all vendors)
  
  phase_2_add_native:
    description: "Add vendor-specific paths for advanced features"
    metrics:
      - OSPF detailed state (vendor-specific)
      - EVPN/VXLAN metrics (vendor-specific)
      - Advanced BGP RIB (vendor-specific)
  
  phase_3_normalize:
    description: "Apply normalization to create universal metrics"
    actions:
      - Configure gNMIc event processors
      - Add Prometheus relabeling rules
      - Update Grafana dashboards to use normalized names
  
  phase_4_validate:
    description: "Verify universal queries work across all vendors"
    validation:
      - Test queries return data from all vendors
      - Verify vendor tags are present
      - Confirm metric values are correct
      - Check dashboard compatibility

