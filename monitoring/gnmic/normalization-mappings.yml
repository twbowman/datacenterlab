# =============================================================================
# OSPF METRICS
# =============================================================================
# OSPF has LIMITED OpenConfig support - vendor-specific paths recommended
# Use native paths for production deployments

ospf_metrics:
  description: "OSPF neighbor state, area information, and LSA statistics"
  openconfig_support: "Limited - recommend using vendor-specific paths"

  # Normalized metric names (target output)
  normalized_metrics:
    - network_ospf_neighbor_state
    - network_ospf_retransmission_queue_length
    - network_ospf_neighbor_priority
    - network_ospf_neighbor_dead_timer
    - network_ospf_area_lsa_count
    - network_ospf_interface_cost
    - network_ospf_interface_state

  # Vendor-specific paths and mappings
  vendors:
    sr_linux:
      openconfig_path: "/network-instances/network-instance/protocols/protocol/ospfv2"
      native_path: "/network-instance[name=default]/protocols/ospf"
      recommendation: "Use native path - better support and more detailed metrics"

      mappings:
        neighbor_state:
          openconfig: "/network-instances/network-instance/protocols/protocol/ospfv2/areas/area/interfaces/interface/neighbors/neighbor/state/state"
          native: "/network-instance/protocols/ospf/instance/area/interface/neighbor/adjacency-state"
          normalized: "network_ospf_neighbor_state"
          gnmic_auto_name: "gnmic_srl_ospf_srl_nokia_network_instance_network_instance_protocols_srl_nokia_ospf_ospf_instance_area_interface_neighbor_adjacency_state"
          notes: "Values: DOWN, ATTEMPT, INIT, 2WAY, EXSTART, EXCHANGE, LOADING, FULL"

        retransmission_queue_length:
          openconfig: "Not available in OpenConfig"
          native: "/network-instance/protocols/ospf/instance/area/interface/neighbor/retransmission-queue-length"
          normalized: "network_ospf_retransmission_queue_length"
          gnmic_auto_name: "gnmic_srl_ospf_srl_nokia_network_instance_network_instance_protocols_srl_nokia_ospf_ospf_instance_area_interface_neighbor_retransmission_queue_length"

        neighbor_priority:
