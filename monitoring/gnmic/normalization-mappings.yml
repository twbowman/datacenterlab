# Vendor-Specific to OpenConfig Path Mappings
#
# This file documents the mapping between vendor-specific telemetry paths
# and normalized OpenConfig paths for all supported vendors in the lab.
#
# Purpose: Enable vendor-agnostic monitoring queries across SR Linux, Arista, SONiC, and Juniper
# Requirements: 4.1, 4.2, 4.6
#
# Usage:
#   1. Use these mappings to configure gNMIc event processors
#   2. Use these mappings to configure Prometheus relabeling rules
#   3. Reference when creating universal Grafana dashboards
#
# Normalization Strategy:
#   - OpenConfig paths are used where vendor support exists
#   - Vendor-specific paths are mapped to common normalized metric names
#   - All normalized metrics use prefix: network_*
#   - Vendor tags are preserved for filtering and drill-down

---
# =============================================================================
# INTERFACE COUNTERS
# =============================================================================
# Interface statistics have the best cross-vendor OpenConfig support
# All vendors support OpenConfig /interfaces/interface/state/counters

interface_counters:
  description: "Interface traffic counters (octets, packets, errors, discards)"
  openconfig_support: "Excellent - all vendors support this path"

  # Normalized metric names (target output)
  normalized_metrics:
    - network_interface_in_octets
    - network_interface_out_octets
    - network_interface_in_packets
    - network_interface_out_packets
    - network_interface_in_errors
    - network_interface_out_errors
    - network_interface_in_discards
    - network_interface_out_discards
    - network_interface_in_unicast_packets
    - network_interface_out_unicast_packets
    - network_interface_in_broadcast_packets
    - network_interface_out_broadcast_packets
    - network_interface_in_multicast_packets
    - network_interface_out_multicast_packets
    - network_interface_carrier_transitions
    - network_interface_in_fcs_errors
    - network_interface_oper_status
    - network_interface_admin_status

  # Vendor-specific paths and mappings
  vendors:
    sr_linux:
      openconfig_path: "/interfaces/interface/state/counters"
      native_path: "/interface[name=*]/statistics"
      recommendation: "Use OpenConfig path for universal compatibility"

      mappings:
        in_octets:
          openconfig: "/interfaces/interface/state/counters/in-octets"
          native: "/interface/statistics/in-octets"
          normalized: "network_interface_in_octets"

        out_octets:
          openconfig: "/interfaces/interface/state/counters/out-octets"
          native: "/interface/statistics/out-octets"
          normalized: "network_interface_out_octets"

        in_packets:
          openconfig: "/interfaces/interface/state/counters/in-pkts"
          native: "/interface/statistics/in-packets"
          normalized: "network_interface_in_packets"

        out_packets:
          openconfig: "/interfaces/interface/state/counters/out-pkts"
          native: "/interface/statistics/out-packets"
          normalized: "network_interface_out_packets"

        in_errors:
          openconfig: "/interfaces/interface/state/counters/in-errors"
          native: "/interface/statistics/in-error-packets"
          normalized: "network_interface_in_errors"

        out_errors:
          openconfig: "/interfaces/interface/state/counters/out-errors"
          native: "/interface/statistics/out-error-packets"
          normalized: "network_interface_out_errors"

        in_discards:
          openconfig: "/interfaces/interface/state/counters/in-discards"
          native: "/interface/statistics/in-discarded-packets"
          normalized: "network_interface_in_discards"

        out_discards:
          openconfig: "/interfaces/interface/state/counters/out-discards"
          native: "/interface/statistics/out-discarded-packets"
          normalized: "network_interface_out_discards"
    arista_eos:
      openconfig_path: "/interfaces/interface/state/counters"
      native_path: "/Sysdb/interface/counter/eth/slice/phy/*/intfCounterDir/*/intfCounter"
      recommendation: "Use OpenConfig path - excellent support"

      mappings:
        in_octets:
          openconfig: "/interfaces/interface/state/counters/in-octets"
          native: "/Sysdb/.../inOctets"
          normalized: "network_interface_in_octets"

        out_octets:
          openconfig: "/interfaces/interface/state/counters/out-octets"
          native: "/Sysdb/.../outOctets"
          normalized: "network_interface_out_octets"

        in_packets:
          openconfig: "/interfaces/interface/state/counters/in-pkts"
          native: "/Sysdb/.../inUcastPkts"
          normalized: "network_interface_in_packets"

        out_packets:
          openconfig: "/interfaces/interface/state/counters/out-pkts"
          native: "/Sysdb/.../outUcastPkts"
          normalized: "network_interface_out_packets"

        in_errors:
          openconfig: "/interfaces/interface/state/counters/in-errors"
          native: "/Sysdb/.../inErrors"
          normalized: "network_interface_in_errors"

        out_errors:
          openconfig: "/interfaces/interface/state/counters/out-errors"
          native: "/Sysdb/.../outErrors"
          normalized: "network_interface_out_errors"

        in_discards:
          openconfig: "/interfaces/interface/state/counters/in-discards"
          native: "/Sysdb/.../inDiscards"
          normalized: "network_interface_in_discards"

        out_discards:
          openconfig: "/interfaces/interface/state/counters/out-discards"
          native: "/Sysdb/.../outDiscards"
          normalized: "network_interface_out_discards"
    sonic:
      openconfig_path: "/interfaces/interface/state/counters"
      native_path: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters"
      recommendation: "Use OpenConfig path - good support"

      mappings:
        in_octets:
          openconfig: "/interfaces/interface/state/counters/in-octets"
          native: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-octets"
          normalized: "network_interface_in_octets"

        out_octets:
          openconfig: "/interfaces/interface/state/counters/out-octets"
          native: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-octets"
          normalized: "network_interface_out_octets"

        in_packets:
          openconfig: "/interfaces/interface/state/counters/in-pkts"
          native: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-pkts"
          normalized: "network_interface_in_packets"

        out_packets:
          openconfig: "/interfaces/interface/state/counters/out-pkts"
          native: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-pkts"
          normalized: "network_interface_out_packets"

        in_errors:
          openconfig: "/interfaces/interface/state/counters/in-errors"
          native: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-errors"
          normalized: "network_interface_in_errors"

        out_errors:
          openconfig: "/interfaces/interface/state/counters/out-errors"
          native: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-errors"
          normalized: "network_interface_out_errors"

        in_discards:
          openconfig: "/interfaces/interface/state/counters/in-discards"
          native: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/in-discards"
          normalized: "network_interface_in_discards"

        out_discards:
          openconfig: "/interfaces/interface/state/counters/out-discards"
          native: "/sonic-port:sonic-port/PORT/PORT_LIST/state/counters/out-discards"
          normalized: "network_interface_out_discards"
    juniper:
      openconfig_path: "/interfaces/interface/state/counters"
      native_path: "/junos/system/linecard/interface/logical/usage"
      recommendation: "Use OpenConfig path - good support"

      mappings:
        in_octets:
          openconfig: "/interfaces/interface/state/counters/in-octets"
          native: "/junos/.../in-octets"
          normalized: "network_interface_in_octets"

        out_octets:
          openconfig: "/interfaces/interface/state/counters/out-octets"
