frr version 8.5
frr defaults traditional
hostname spine
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.1/32
!
interface eth1
 description Link to leaf1 eth1
 ip address 10.1.1.0/31
!
interface eth2
 description Link to leaf1 eth2
 ip address 10.1.2.0/31
!
interface eth3
 description Link to leaf2 eth1
 ip address 10.1.3.0/31
!
interface eth4
 description Link to leaf2 eth2
 ip address 10.1.4.0/31
!
router bgp 65001
 bgp router-id 10.0.0.1
 neighbor 10.1.1.1 remote-as 65011
 neighbor 10.1.1.1 description leaf1
 neighbor 10.1.2.1 remote-as 65011
 neighbor 10.1.2.1 description leaf1
 neighbor 10.1.3.1 remote-as 65012
 neighbor 10.1.3.1 description leaf2
 neighbor 10.1.4.1 remote-as 65012
 neighbor 10.1.4.1 description leaf2
 !
 address-family ipv4 unicast
  network 10.0.0.1/32
  neighbor 10.1.1.1 activate
  neighbor 10.1.2.1 activate
  neighbor 10.1.3.1 activate
  neighbor 10.1.4.1 activate
 exit-address-family
!
line vty
!
