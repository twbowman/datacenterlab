# Telegraf Configuration for SR Linux Network Monitoring via gNMI
# Telegraf connects to switches and subscribes to telemetry streams

[global_tags]
  environment = "clos-lab"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "monitoring"
  omit_hostname = false

# Output to Prometheus
[[outputs.prometheus_client]]
  listen = ":8888"
  path = "/metrics"

# gNMI Input - Spine1
[[inputs.gnmi]]
  addresses = ["172.20.20.10:57400"]
  username = "admin"
  password = "NokiaSrl1!"
  redial = "10s"
  encoding = "json_ietf"
  
  
  [[inputs.gnmi.subscription]]
    name = "spine1"
    origin = "srl_nokia"
    path = "/interface[name=ethernet-*]/statistics"
    subscription_mode = "sample"
    sample_interval = "10s"

