exclude = [".venv", "venv", ".git", "__pycache__", ".hypothesis"]
target-version = "py310"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
    "S",   # flake8-bandit (security)
]

ignore = [
    "E501",  # line too long (handled by formatter)
    "S101",  # use of assert (common in tests)
    "S110",  # try-except-pass (intentional in some scripts)
    "S603",  # subprocess without shell=True (intentional)
    "S607",  # starting process with partial path (intentional)
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",  # assert allowed in tests
    "S104",  # binding to 0.0.0.0 in test data
    "S108",  # /tmp usage in tests
    "S110",  # try-except-pass in tests
    "S602",  # shell=True in test subprocess calls
    "ARG",   # unused arguments common in fixtures
    "E402",  # import order in test setup
]
"validation/**/*.py" = [
    "S101",  # assert allowed in tests
    "ARG",   # unused arguments in test helpers
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[lint.isort]
known-first-party = ["scripts"]
