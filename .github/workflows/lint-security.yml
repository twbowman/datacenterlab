name: Lint & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.9'

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy scripts/ ansible/plugins/ ansible/filter_plugins/ --ignore-missing-imports

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install yamllint
        run: uv tool install yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install ansible-lint
        run: uv tool install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint ansible/
        continue-on-error: true

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          additional_files: '*.sh'
          severity: warning

  security-bandit:
    name: Python Security (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: uv tool install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r scripts/ ansible/plugins/ ansible/filter_plugins/ \
            -f json -o bandit-report.json \
            --severity-level medium || true
          bandit -r scripts/ ansible/plugins/ ansible/filter_plugins/ \
            -f screen --severity-level medium

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  security-trivy:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1

      - name: Run Trivy config scan (IaC misconfigs)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

  security-gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-security-summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - python-lint
      - yaml-lint
      - ansible-lint
      - shell-lint
      - security-bandit
      - security-trivy
      - security-gitleaks
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Lint & Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Lint (Ruff + Mypy) | ${{ needs.python-lint.result == 'success' && '✅' || '❌' }} ${{ needs.python-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Lint | ${{ needs.yaml-lint.result == 'success' && '✅' || '❌' }} ${{ needs.yaml-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ansible Lint | ${{ needs.ansible-lint.result == 'success' && '✅' || '⚠️' }} ${{ needs.ansible-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shell Lint (ShellCheck) | ${{ needs.shell-lint.result == 'success' && '✅' || '❌' }} ${{ needs.shell-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Security (Bandit) | ${{ needs.security-bandit.result == 'success' && '✅' || '❌' }} ${{ needs.security-bandit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan (Trivy) | ${{ needs.security-trivy.result == 'success' && '✅' || '❌' }} ${{ needs.security-trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection (Gitleaks) | ${{ needs.security-gitleaks.result == 'success' && '✅' || '❌' }} ${{ needs.security-gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
