name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-xdist
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=scripts \
            --cov=ansible/plugins \
            --cov=ansible/filter_plugins \
            --cov-report=xml \
            --cov-report=term-missing \
            --junit-xml=test-results/unit-tests.xml
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit-tests.xml
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage.xml
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-xdist
      
      - name: Run property-based tests
        run: |
          pytest tests/property/ \
            -v \
            --tb=short \
            --hypothesis-profile=ci \
            --hypothesis-show-statistics \
            --junit-xml=test-results/property-tests.xml
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-test-results
          path: test-results/property-tests.xml
      
      - name: Upload Hypothesis database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hypothesis-database
          path: .hypothesis/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            docker.io \
            docker-compose \
            bridge-utils
      
      - name: Install containerlab
        run: |
          # Install containerlab
          sudo bash -c "$(curl -sL https://get.containerlab.dev)"
          sudo containerlab version
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-timeout
      
      - name: Pull container images
        run: |
          # Pull SR Linux image (if available in CI)
          # Note: This may require authentication or use of public images
          echo "Skipping image pull - using cached images or mocks"
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            -s \
            --tb=short \
            --timeout=300 \
            --junit-xml=test-results/integration-tests.xml
        env:
          # CI environment flag for tests to adjust behavior
          CI: true
      
      - name: Collect containerlab logs
        if: always()
        run: |
          mkdir -p test-logs
          sudo containerlab inspect --all > test-logs/containerlab-inspect.txt || true
          docker ps -a > test-logs/docker-ps.txt || true
          docker logs $(docker ps -aq) > test-logs/docker-logs.txt 2>&1 || true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/integration-tests.xml
      
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: test-logs/
      
      - name: Cleanup lab environment
        if: always()
        run: |
          sudo containerlab destroy --all || true
          docker system prune -af || true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, property-tests, integration-tests]
    if: always()
    
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
      
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results/**/*.xml
          check_name: Test Results Summary
          comment_title: Test Results
          fail_on: errors
      
      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Property Tests: ${{ needs.property-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.property-tests.result }}" == "success" ] && \
             [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed. Please review the logs." >> $GITHUB_STEP_SUMMARY
          fi
