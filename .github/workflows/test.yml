name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.9'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=scripts \
            --cov=ansible/plugins \
            --cov=ansible/filter_plugins \
            --cov-report=xml \
            --cov-report=term-missing \
            --junit-xml=test-results/unit-tests.xml
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit-tests.xml
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage.xml
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Run property-based tests
        run: |
          uv run pytest tests/property/ \
            -v \
            --tb=short \
            --hypothesis-profile=ci \
            --hypothesis-show-statistics \
            --junit-xml=test-results/property-tests.xml
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-test-results
          path: test-results/property-tests.xml
      
      - name: Upload Hypothesis database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hypothesis-database
          path: .hypothesis/

  # Integration tests are disabled in CI/CD as they require:
  # - Containerlab deployment with actual network devices
  # - Vendor-specific container images (SR Linux, Arista cEOS, etc.)
  # - Significant compute resources and time
  # Run integration tests locally using: pytest tests/integration/ -v -s
  #
  # integration-tests:
  #   name: Integration Tests (Local Only)
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 30
  #   if: false  # Disabled - run locally only

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, property-tests]
    if: always()
    
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
      
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results/unit-test-results/*.xml
            test-results/property-test-results/*.xml
          check_name: Test Results Summary
          comment_title: Test Results
          fail_on: errors
      
      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Property Tests: ${{ needs.property-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: Skipped (run locally only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.property-tests.result }}" == "success" ]; then
            echo "✅ All CI tests passed!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ Integration tests require local containerlab deployment." >> $GITHUB_STEP_SUMMARY
            echo "Run locally with: \`pytest tests/integration/ -v -s\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed. Please review the logs." >> $GITHUB_STEP_SUMMARY
          fi
