name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write
  checks: write

env:
  PYTHON_VERSION: '3.10'

# =============================================================================
# Stage 1: Pre-commit checks (fast linters - should also run locally)
# =============================================================================
jobs:
  python-lint:
    name: "Lint: Python (Ruff + Mypy)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy scripts/ ansible/plugins/ ansible/filter_plugins/ --ignore-missing-imports

  yaml-lint:
    name: "Lint: YAML"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install yamllint
        run: uv tool install yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml .

  ansible-lint:
    name: "Lint: Ansible"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install ansible-lint
        run: uv tool install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint ansible/
        continue-on-error: true

  shell-lint:
    name: "Lint: Shell (ShellCheck)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          additional_files: '*.sh'
          severity: warning

  # Gate: all pre-commit lint checks must pass
  lint-gate:
    name: "Gate: Lint"
    runs-on: ubuntu-latest
    needs: [python-lint, yaml-lint, ansible-lint, shell-lint]
    if: always()
    steps:
      - name: Check lint results
        run: |
          echo "Python Lint: ${{ needs.python-lint.result }}"
          echo "YAML Lint: ${{ needs.yaml-lint.result }}"
          echo "Ansible Lint: ${{ needs.ansible-lint.result }}"
          echo "Shell Lint: ${{ needs.shell-lint.result }}"

          # ansible-lint is soft-fail, so we only hard-check the others
          if [ "${{ needs.python-lint.result }}" != "success" ] || \
             [ "${{ needs.yaml-lint.result }}" != "success" ] || \
             [ "${{ needs.shell-lint.result }}" != "success" ]; then
            echo "::error::Lint checks failed. Fix lint issues before proceeding."
            exit 1
          fi

  # =============================================================================
  # Stage 2: Security scans (heavier, CI-only - run after lint passes)
  # =============================================================================
  security-bandit:
    name: "Security: Python (Bandit)"
    runs-on: ubuntu-latest
    needs: [lint-gate]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: uv tool install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r scripts/ ansible/plugins/ ansible/filter_plugins/ \
            -f json -o bandit-report.json \
            --severity-level medium || true
          bandit -r scripts/ ansible/plugins/ ansible/filter_plugins/ \
            -f screen --severity-level medium

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  security-trivy:
    name: "Security: Trivy"
    runs-on: ubuntu-latest
    needs: [lint-gate]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1

      - name: Run Trivy config scan (IaC misconfigs)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

  security-checkov:
    name: "Security: Checkov (IaC)"
    runs-on: ubuntu-latest
    needs: [lint-gate]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on GitHub Actions workflows
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/workflows
          framework: github_actions
          output_format: cli
          quiet: true
          soft_fail: false

      - name: Run Checkov on Ansible
        if: always()
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ansible
          framework: ansible
          output_format: cli
          quiet: true
          soft_fail: true

  security-gitleaks:
    name: "Security: Gitleaks"
    runs-on: ubuntu-latest
    needs: [lint-gate]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Gate: all security scans must pass
  security-gate:
    name: "Gate: Security"
    runs-on: ubuntu-latest
    needs: [security-bandit, security-trivy, security-checkov, security-gitleaks]
    if: always()
    steps:
      - name: Check security results
        run: |
          echo "Bandit: ${{ needs.security-bandit.result }}"
          echo "Trivy: ${{ needs.security-trivy.result }}"
          echo "Checkov: ${{ needs.security-checkov.result }}"
          echo "Gitleaks: ${{ needs.security-gitleaks.result }}"

          if [ "${{ needs.security-bandit.result }}" != "success" ] || \
             [ "${{ needs.security-trivy.result }}" != "success" ] || \
             [ "${{ needs.security-checkov.result }}" != "success" ] || \
             [ "${{ needs.security-gitleaks.result }}" != "success" ]; then
            echo "::error::Security scans failed. Review findings before proceeding."
            exit 1
          fi

  # =============================================================================
  # Stage 3: Tests (run only after lint + security pass)
  # =============================================================================
  unit-tests:
    name: "Test: Unit"
    runs-on: ubuntu-latest
    needs: [security-gate]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=scripts \
            --cov=ansible/plugins \
            --cov=ansible/filter_plugins \
            --cov-report=xml \
            --cov-report=term-missing \
            --junit-xml=test-results/unit-tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit-tests.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage.xml

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  property-tests:
    name: "Test: Property-Based"
    runs-on: ubuntu-latest
    needs: [security-gate]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run property-based tests
        run: |
          uv run pytest tests/property/ \
            -v \
            --tb=short \
            --hypothesis-profile=ci \
            --hypothesis-show-statistics \
            --junit-xml=test-results/property-tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-test-results
          path: test-results/property-tests.xml

      - name: Upload Hypothesis database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hypothesis-database
          path: .hypothesis/

  # =============================================================================
  # Pipeline Summary
  # =============================================================================
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      - python-lint
      - yaml-lint
      - ansible-lint
      - shell-lint
      - security-bandit
      - security-trivy
      - security-checkov
      - security-gitleaks
      - unit-tests
      - property-tests
    if: always()
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
        continue-on-error: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results/unit-test-results/*.xml
            test-results/property-test-results/*.xml
          check_name: Test Results Summary
          comment_title: Test Results
          fail_on: errors
        continue-on-error: true

      - name: Generate pipeline summary
        if: always()
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Stage 1: Pre-commit Lint" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python (Ruff + Mypy) | ${{ needs.python-lint.result == 'success' && '✅' || '❌' }} ${{ needs.python-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML | ${{ needs.yaml-lint.result == 'success' && '✅' || '❌' }} ${{ needs.yaml-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ansible | ${{ needs.ansible-lint.result == 'success' && '✅' || '⚠️' }} ${{ needs.ansible-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shell (ShellCheck) | ${{ needs.shell-lint.result == 'success' && '✅' || '❌' }} ${{ needs.shell-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Stage 2: Security Scans" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit (Python) | ${{ needs.security-bandit.result == 'success' && '✅' || '❌' }} ${{ needs.security-bandit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.security-trivy.result == 'success' && '✅' || '❌' }} ${{ needs.security-trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov (IaC) | ${{ needs.security-checkov.result == 'success' && '✅' || '❌' }} ${{ needs.security-checkov.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.security-gitleaks.result == 'success' && '✅' || '❌' }} ${{ needs.security-gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Stage 3: Tests" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }} ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Property Tests | ${{ needs.property-tests.result == 'success' && '✅' || '❌' }} ${{ needs.property-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ⏭️ skipped (local only) |" >> $GITHUB_STEP_SUMMARY
