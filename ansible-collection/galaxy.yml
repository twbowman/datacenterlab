---
namespace: netgnmi
name: dcfabric
version: 1.0.0
readme: README.md
authors:
  - Todd Bowman
description: >-
  Multi-vendor datacenter CLOS fabric automation via gNMI.
  Configure spine-leaf fabrics with OSPF underlay, iBGP overlay, and EVPN/VXLAN
  across SR Linux, Arista EOS, SONiC, and Juniper using gNMI SET.
  Includes topology-aware validation playbooks that verify BGP sessions,
  EVPN route distribution, LLDP adjacencies, and interface state via gNMI GET.
license:
  - MIT
