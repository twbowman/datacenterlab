---
# Arista EOS validation paths
# Full OpenConfig support — all checks use openconfig origin

validate_paths:
  bgp_neighbors:
    path: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state"
    origin: "openconfig"
    remediation_hint: "Check BGP configuration and verify underlay reachability"

  evpn_state:
    path: "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi[afi-safi-name=L2VPN_EVPN]/state"
    origin: "openconfig"
    remediation_hint: "Enable EVPN address family under BGP neighbor configuration"

  ospf_neighbors:
    path: "/network-instances/network-instance/protocols/protocol[identifier=OSPF]/ospf/areas/area/interfaces/interface/neighbors/neighbor/state"
    origin: "openconfig"
    remediation_hint: "Verify OSPF is enabled on interfaces and area IDs match peers"

  lldp_neighbors:
    path: "/lldp/interfaces/interface/neighbors/neighbor/state"
    origin: "openconfig"
    remediation_hint: "Verify LLDP is enabled globally: lldp run"

  interface_state:
    path: "/interfaces/interface/state"
    origin: "openconfig"
    remediation_hint: "Check physical cabling and interface no shutdown configuration"
