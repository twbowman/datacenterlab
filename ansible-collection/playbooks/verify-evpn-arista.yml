---
# Verify EVPN/VXLAN configuration on Arista EOS devices
# This playbook validates EVPN/VXLAN deployment and operational state

- name: Verify EVPN/VXLAN on Arista EOS Devices
  hosts: all
  gather_facts: false

  tasks:
    - name: Display verification information
      debug:
        msg:
          - "Verifying EVPN/VXLAN on: {{ inventory_hostname }}"
          - "Device role: {{ device_role | default('not specified') }}"
      tags: always

    - name: Validate device is Arista EOS
      assert:
        that:
          - ansible_network_os is defined
          - ansible_network_os in ['arista.eos', 'eos']
        fail_msg: "This playbook is only for Arista EOS devices"
      tags: always

    # ========================================================================
    # BGP EVPN Address Family Verification (All Devices)
    # ========================================================================

    - name: Check BGP EVPN address family status
      arista.eos.eos_command:
        commands:
          - show bgp evpn summary
      register: bgp_evpn_summary
      tags: [bgp, evpn]

    - name: Display BGP EVPN summary
      debug:
        msg: "{{ bgp_evpn_summary.stdout_lines[0] }}"
      tags: [bgp, evpn]

    - name: Verify BGP EVPN is configured
      assert:
        that:
          - "'BGP summary information for VRF default' in bgp_evpn_summary.stdout[0] or 'EVPN' in bgp_evpn_summary.stdout[0]"
        fail_msg: "BGP EVPN address family is not configured on {{ inventory_hostname }}"
        success_msg: "✓ BGP EVPN address family is configured"
      tags: [bgp, evpn]

    # ========================================================================
    # VXLAN Interface Verification (Leafs Only)
    # ========================================================================

    - name: Check VXLAN interface status (leafs)
      arista.eos.eos_command:
        commands:
          - show interfaces vxlan1
      register: vxlan_interface
      when: "'leaf' in inventory_hostname"
      tags: [vxlan, interfaces]

    - name: Display VXLAN interface status (leafs)
      debug:
        msg: "{{ vxlan_interface.stdout_lines[0] }}"
      when: "'leaf' in inventory_hostname"
      tags: [vxlan, interfaces]

    - name: Verify VXLAN interface is up (leafs)
      assert:
        that:
          - "'line protocol is up' in vxlan_interface.stdout[0]"
        fail_msg: "VXLAN interface is not up on {{ inventory_hostname }}"
        success_msg: "✓ VXLAN interface is up"
      when: "'leaf' in inventory_hostname"
      tags: [vxlan, interfaces]

    # ========================================================================
    # VLAN to VNI Mapping Verification (Leafs Only)
    # ========================================================================

    - name: Check VLAN to VNI mappings (leafs)
      arista.eos.eos_command:
        commands:
          - show vxlan vni
      register: vxlan_vni
      when: "'leaf' in inventory_hostname"
      tags: [vxlan, vni]

    - name: Display VLAN to VNI mappings (leafs)
      debug:
        msg: "{{ vxlan_vni.stdout_lines[0] }}"
      when: "'leaf' in inventory_hostname"
      tags: [vxlan, vni]

    - name: Verify expected VNIs are configured (leafs)
      assert:
        that:
          - "item.vni | string in vxlan_vni.stdout[0]"
        fail_msg: "VNI {{ item.vni }} for VLAN {{ item.vlan_id }} is not configured on {{ inventory_hostname }}"
        success_msg: "✓ VNI {{ item.vni }} for VLAN {{ item.vlan_id }} is configured"
      loop: "{{ evpn_vxlan.vlan_vni_mappings | default([]) }}"
      when:
        - "'leaf' in inventory_hostname"
        - evpn_vxlan.vlan_vni_mappings is defined
      tags: [vxlan, vni]

    # ========================================================================
    # EVPN Route Verification (All Devices)
    # ========================================================================

    - name: Check EVPN MAC-IP routes (Type 2)
      arista.eos.eos_command:
        commands:
          - show bgp evpn route-type mac-ip
      register: evpn_mac_ip_routes
      tags: [evpn, routes]

    - name: Display EVPN MAC-IP routes
      debug:
        msg: "{{ evpn_mac_ip_routes.stdout_lines[0] }}"
      tags: [evpn, routes]

    - name: Check EVPN IMET routes (Type 3)
      arista.eos.eos_command:
        commands:
          - show bgp evpn route-type imet
      register: evpn_imet_routes
      tags: [evpn, routes]

    - name: Display EVPN IMET routes
      debug:
        msg: "{{ evpn_imet_routes.stdout_lines[0] }}"
      tags: [evpn, routes]

    # ========================================================================
    # VXLAN Tunnel Verification (Leafs Only)
    # ========================================================================

    - name: Check VXLAN flood VTEP list (leafs)
      arista.eos.eos_command:
        commands:
          - show vxlan flood vtep
      register: vxlan_flood_vtep
      when: "'leaf' in inventory_hostname"
      tags: [vxlan, tunnels]

    - name: Display VXLAN flood VTEP list (leafs)
      debug:
        msg: "{{ vxlan_flood_vtep.stdout_lines[0] }}"
      when: "'leaf' in inventory_hostname"
      tags: [vxlan, tunnels]

    # ========================================================================
    # MAC Address Table Verification (Leafs Only)
    # ========================================================================

    - name: Check MAC address table (leafs)
      arista.eos.eos_command:
        commands:
          - show mac address-table
      register: mac_table
      when: "'leaf' in inventory_hostname"
      tags: [mac, learning]

    - name: Display MAC address table summary (leafs)
      debug:
        msg: "{{ mac_table.stdout_lines[0] }}"
      when: "'leaf' in inventory_hostname"
      tags: [mac, learning]

    # ========================================================================
    # VRF Verification (Leafs Only - L3 VNI)
    # ========================================================================

    - name: Check VRF status (leafs with L3 VNI)
      arista.eos.eos_command:
        commands:
          - show vrf
      register: vrf_status
      when:
        - "'leaf' in inventory_hostname"
        - evpn_vxlan.l3vni is defined
        - evpn_vxlan.l3vni | length > 0
      tags: [vrf, l3vni]

    - name: Display VRF status (leafs with L3 VNI)
      debug:
        msg: "{{ vrf_status.stdout_lines[0] }}"
      when:
        - "'leaf' in inventory_hostname"
        - evpn_vxlan.l3vni is defined
        - evpn_vxlan.l3vni | length > 0
      tags: [vrf, l3vni]

    - name: Verify expected VRFs are configured (leafs with L3 VNI)
      assert:
        that:
          - "item.vrf_name in vrf_status.stdout[0]"
        fail_msg: "VRF {{ item.vrf_name }} is not configured on {{ inventory_hostname }}"
        success_msg: "✓ VRF {{ item.vrf_name }} is configured"
      loop: "{{ evpn_vxlan.l3vni | default([]) }}"
      when:
        - "'leaf' in inventory_hostname"
        - evpn_vxlan.l3vni is defined
        - evpn_vxlan.l3vni | length > 0
      tags: [vrf, l3vni]

    # ========================================================================
    # Summary Report
    # ========================================================================

    - name: Generate verification summary
      debug:
        msg:
          - "=========================================="
          - "EVPN/VXLAN Verification Summary"
          - "=========================================="
          - "Device: {{ inventory_hostname }}"
          - "Role: {{ device_role | default('not specified') }}"
          - ""
          - "BGP EVPN:"
          - "  ✓ Address family configured"
          - ""
          - "{% if 'leaf' in inventory_hostname %}VXLAN Configuration:"
          - "  ✓ VXLAN interface operational"
          - "  ✓ VNI mappings: {{ evpn_vxlan.vlan_vni_mappings | default([]) | length }}"
          - "  ✓ L3 VNI instances: {{ evpn_vxlan.l3vni | default([]) | length }}"
          - "{% endif %}"
          - "=========================================="
      tags: always

# Example usage:
#
# Verify EVPN on all Arista devices:
#   ansible-playbook -i inventory.yml playbooks/verify-evpn-arista.yml
#
# Verify EVPN on specific device:
#   ansible-playbook -i inventory.yml playbooks/verify-evpn-arista.yml --limit leaf1
#
# Verify only BGP EVPN:
#   ansible-playbook -i inventory.yml playbooks/verify-evpn-arista.yml --tags bgp,evpn
#
# Verify only VXLAN:
#   ansible-playbook -i inventory.yml playbooks/verify-evpn-arista.yml --tags vxlan
