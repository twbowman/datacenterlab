---
# OpenConfig-based configuration
# Uses OpenConfig YANG models for vendor-neutral configuration
# Production datacenter architecture:
# - OSPF provides underlay routing and next-hop reachability
# - BGP provides overlay routing for application prefixes
- name: Configure datacenter network using OpenConfig models
  hosts: all
  gather_facts: false
  roles:
    - role: openconfig_interfaces
      tags: [interfaces, config]
    - role: openconfig_lldp
      tags: [lldp, config]
    - role: openconfig_ospf
      tags: [ospf, underlay, config]
    - role: openconfig_bgp
      tags: [bgp, overlay, config]
