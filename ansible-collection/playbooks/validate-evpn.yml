---
# EVPN Route Validation Playbook
# Uses gnmi_validate module with vendor-native EVPN paths to verify
# EVPN address family is enabled, routes are advertised/received,
# and VNI mappings match inventory.
#
# Requirements: 7.2, 7.5
# Inventory variables used: evpn_vxlan, validate_paths.evpn_state
# Runs only on leafs with evpn_vxlan.enabled == true

- name: Validate EVPN state
  hosts: leafs
  gather_facts: false
  tags:
    - evpn

  tasks:
    - name: Build expected EVPN state
      ansible.builtin.set_fact:
        expected_evpn:
          enabled: true
          advertise_all_vni: "{{ evpn_vxlan.bgp_evpn.advertise_all_vni | default(true) }}"
          vni_mappings: >-
            {{
              evpn_vxlan.vlan_vni_mappings
              | map(attribute='vni')
              | list
            }}
      when: evpn_vxlan.enabled | default(false)
      tags:
        - evpn

    - name: Validate EVPN state via gNMI
      gnmi_validate:
        host: "{{ ansible_host }}"
        port: "{{ gnmi_port }}"
        username: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        skip_verify: "{{ gnmi_skip_verify | default(true) }}"
        check_name: "evpn_state"
        path: "{{ validate_paths.evpn_state.path }}"
        origin: "{{ validate_paths.evpn_state.origin | default(omit) }}"
        expected: "{{ expected_evpn }}"
        remediation_hint: "{{ validate_paths.evpn_state.remediation_hint | default('Enable EVPN address family in BGP configuration') }}"
      register: evpn_result
      when: evpn_vxlan.enabled | default(false)
      tags:
        - evpn

    - name: Report EVPN validation result
      ansible.builtin.debug:
        msg: >-
          EVPN validation {{ evpn_result.result.status | upper }}
          on {{ inventory_hostname }}:
          expected VNIs={{ expected_evpn.vni_mappings }},
          diffs={{ evpn_result.result.diffs }}
      when: evpn_vxlan.enabled | default(false)
      tags:
        - evpn

    - name: Assert EVPN state is correct
      ansible.builtin.assert:
        that:
          - evpn_result.result.status == 'pass'
        fail_msg: >-
          EVPN validation FAILED on {{ inventory_hostname }}.
          {{ evpn_result.result.remediation }}
          Diffs: {{ evpn_result.result.diffs }}
        success_msg: "EVPN state validated on {{ inventory_hostname }}"
      when: evpn_vxlan.enabled | default(false)
      tags:
        - evpn

    - name: Skip EVPN validation (not enabled)
      ansible.builtin.debug:
        msg: "EVPN not enabled on {{ inventory_hostname }}, skipping validation"
      when: not (evpn_vxlan.enabled | default(false))
      tags:
        - evpn
