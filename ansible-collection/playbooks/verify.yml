---
# Verification playbook - checks network configuration
- name: Verify network configuration
  hosts: all
  gather_facts: no
  tasks:
    - name: Verify LLDP neighbors using OpenConfig
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ gnmi_port }}/jsonrpc"
        method: POST
        body_format: json
        validate_certs: no
        headers:
          Content-Type: "application/json"
        body:
          jsonrpc: "2.0"
          id: 1
          method: "get"
          params:
            prefix:
              origin: "openconfig"
            path: "/lldp/interfaces/interface[name=*]/neighbors"
            encoding: "json_ietf"
        user: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        force_basic_auth: yes
      register: lldp_neighbors
      failed_when: false
      tags: ['lldp', 'verify']

    - name: Display LLDP neighbors
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ lldp_neighbors.json.result | default('No neighbors') }}"
      tags: ['lldp', 'verify']

    - name: Verify BGP neighbors using OpenConfig
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ gnmi_port }}/jsonrpc"
        method: POST
        body_format: json
        validate_certs: no
        headers:
          Content-Type: "application/json"
        body:
          jsonrpc: "2.0"
          id: 2
          method: "get"
          params:
            prefix:
              origin: "openconfig"
            path: "/network-instances/network-instance[name=default]/protocols/protocol[identifier=BGP][name=BGP]/bgp/neighbors"
            encoding: "json_ietf"
        user: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        force_basic_auth: yes
      register: bgp_neighbors
      failed_when: false
      tags: ['bgp', 'verify']

    - name: Display BGP neighbors
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ bgp_neighbors.json.result | default('No BGP neighbors') }}"
      tags: ['bgp', 'verify']

- name: Verification summary
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Show verification complete
      ansible.builtin.debug:
        msg: |
          ========================================
          Network Verification Complete
          ========================================

          Use tags to verify specific components:
            - LLDP only: ansible-playbook playbooks/verify.yml --tags lldp
            - BGP only: ansible-playbook playbooks/verify.yml --tags bgp
