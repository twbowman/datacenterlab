---
# Main site playbook - Multi-vendor dispatcher pattern
# Routes configuration to vendor-specific roles based on ansible_network_os
# Supports: SR Linux, Arista EOS, SONiC, Juniper

- name: Configure Multi-Vendor Datacenter Network
  hosts: all
  gather_facts: false

  tasks:
    - name: Display deployment information
      debug:
        msg:
          - "Configuring device: {{ inventory_hostname }}"
          - "Network OS: {{ ansible_network_os | default('not detected') }}"
          - "Management IP: {{ ansible_host }}"
      tags: always

    - name: Validate ansible_network_os is defined
      assert:
        that:
          - ansible_network_os is defined
          - ansible_network_os | length > 0
        fail_msg: |
          Network OS not detected for {{ inventory_hostname }}.
          Please ensure ansible_network_os is set in inventory or use dynamic inventory plugin.
        success_msg: "Network OS detected: {{ ansible_network_os }}"
      tags: always

    - name: Validate ansible_network_os is supported
      assert:
        that:
          - ansible_network_os in ['nokia.srlinux', 'srlinux', 'arista.eos', 'eos', 'dellemc.sonic', 'sonic', 'juniper.junos', 'junos']
        fail_msg: |
          Network OS '{{ ansible_network_os }}' is not supported.
          Supported vendors: SR Linux (nokia.srlinux), Arista EOS (arista.eos), SONiC (dellemc.sonic), Juniper (juniper.junos)
        success_msg: "Network OS {{ ansible_network_os }} is supported"
      tags: always

    # Normalize OS names to short form for consistent routing
    - name: Normalize network OS name
      set_fact:
        normalized_os: "{{ ansible_network_os | regex_replace('^nokia\\.', '') | regex_replace('^arista\\.', '') | regex_replace('^dellemc\\.', '') | regex_replace('^juniper\\.', '') }}"
      tags: always

    # Pre-deployment validation
    - name: Validate configuration syntax before deployment
      include_role:
        name: config_validation
      tags: [validation, always]

    # Capture configuration state for rollback
    # Temporarily disabled - module dependency issue
    # - name: Capture current configuration state
    #   include_role:
    #     name: config_rollback
    #   tags: [rollback, always]

    # SR Linux Configuration Path
    - name: Configure SR Linux devices
      block:
        - name: Include SR Linux system role
          include_role:
            name: methods/srlinux_gnmi/roles/gnmi_system
          tags: [system, config]

        - name: Include SR Linux interfaces role
          include_role:
            name: methods/srlinux_gnmi/roles/gnmi_interfaces
          tags: [interfaces, config]

        - name: Include SR Linux LLDP role
          include_role:
            name: methods/srlinux_gnmi/roles/gnmi_lldp
          tags: [lldp, config]

        - name: Include SR Linux OSPF role
          include_role:
            name: methods/srlinux_gnmi/roles/gnmi_ospf
          tags: [ospf, underlay, config]

        - name: Include SR Linux BGP role
          include_role:
            name: methods/srlinux_gnmi/roles/gnmi_bgp
          tags: [bgp, overlay, config]

        - name: Include SR Linux EVPN VXLAN role
          include_role:
            name: methods/srlinux_gnmi/roles/gnmi_evpn_vxlan
          tags: [evpn, vxlan, overlay, config]
      rescue:
        - name: Report SR Linux configuration failure
          debug:
            msg: |
              ✗ Configuration failed for SR Linux device {{ inventory_hostname }}
              Error: {{ ansible_failed_result.msg | default('Unknown error') }}

              Remediation suggestions:
              - Verify device is reachable: ping {{ ansible_host }}
              - Check gNMI service is running on port {{ gnmi_port }}
              - Verify credentials: username={{ gnmi_username }}
              - Review configuration syntax in inventory
              - Check device logs for detailed error messages

              Attempting automatic rollback...

        - name: Execute rollback for SR Linux
          include_tasks: roles/config_rollback/tasks/rollback_srlinux.yml
          when: rollback_available | default(false)

        - name: Fail after rollback attempt
          fail:
            msg: |
              Configuration deployment failed for {{ inventory_hostname }}.
              {% if rollback_available | default(false) %}
              Rollback completed. Device restored to previous state.
              {% else %}
              Rollback not available. Manual recovery may be required.
              {% endif %}
      when: normalized_os == 'srlinux'

    # Arista EOS Configuration Path
    - name: Configure Arista EOS devices
      block:
        - name: Arista EOS configuration not yet implemented
          debug:
            msg: |
              Arista EOS configuration roles are not yet implemented.
              This is a placeholder for future implementation (Task 4).
              Device {{ inventory_hostname }} will be skipped.

        - name: Skip Arista device gracefully
          meta: end_host
      rescue:
        - name: Report Arista EOS configuration failure
          debug:
            msg: |
              ✗ Configuration failed for Arista EOS device {{ inventory_hostname }}
              Error: {{ ansible_failed_result.msg | default('Unknown error') }}

              Remediation suggestions:
              - Verify device is reachable: ping {{ ansible_host }}
              - Check eAPI/gNMI service is running
              - Verify credentials: username={{ ansible_user }}
              - Review configuration syntax in inventory
              - Check device logs for detailed error messages

              Attempting automatic rollback...

        - name: Execute rollback for Arista EOS
          include_tasks: roles/config_rollback/tasks/rollback_arista.yml
          when: rollback_available | default(false)

        - name: Fail after rollback attempt
          fail:
            msg: |
              Configuration deployment failed for {{ inventory_hostname }}.
              {% if rollback_available | default(false) %}
              Rollback completed. Device restored to previous state.
              {% else %}
              Rollback not available. Manual recovery may be required.
              {% endif %}
      when: normalized_os == 'eos'

    # SONiC Configuration Path
    - name: Configure SONiC devices
      block:
        - name: Include SONiC interfaces role
          include_role:
            name: sonic_interfaces
          tags: [interfaces, config]

        - name: Include SONiC OSPF role
          include_role:
            name: sonic_ospf
          tags: [ospf, underlay, config]

        - name: Include SONiC BGP role
          include_role:
            name: sonic_bgp
          tags: [bgp, overlay, config]
      rescue:
        - name: Report SONiC configuration failure
          debug:
            msg: |
              ✗ Configuration failed for SONiC device {{ inventory_hostname }}
              Error: {{ ansible_failed_result.msg | default('Unknown error') }}

              Remediation suggestions:
              - Verify device is reachable: ping {{ ansible_host }}
              - Check REST API service is running
              - Verify credentials: username={{ ansible_user }}
              - Review configuration syntax in inventory
              - Check device logs for detailed error messages

              Attempting automatic rollback...

        - name: Execute rollback for SONiC
          include_tasks: roles/config_rollback/tasks/rollback_sonic.yml
          when: rollback_available | default(false)

        - name: Fail after rollback attempt
          fail:
            msg: |
              Configuration deployment failed for {{ inventory_hostname }}.
              {% if rollback_available | default(false) %}
              Rollback completed. Device restored to previous state.
              {% else %}
              Rollback not available. Manual recovery may be required.
              {% endif %}
      when: normalized_os == 'sonic'

    # Juniper Configuration Path
    - name: Configure Juniper devices
      block:
        - name: Include Juniper interfaces role
          include_role:
            name: junos_interfaces
          tags: [interfaces, config]

        - name: Include Juniper OSPF role
          include_role:
            name: junos_ospf
          tags: [ospf, underlay, config]

        - name: Include Juniper BGP role
          include_role:
            name: junos_bgp
          tags: [bgp, overlay, config]
      rescue:
        - name: Report Juniper configuration failure
          debug:
            msg: |
              ✗ Configuration failed for Juniper device {{ inventory_hostname }}
              Error: {{ ansible_failed_result.msg | default('Unknown error') }}

              Remediation suggestions:
              - Verify device is reachable: ping {{ ansible_host }}
              - Check NETCONF service is running
              - Verify credentials: username={{ ansible_user }}
              - Review configuration syntax in inventory
              - Check device logs for detailed error messages

              Attempting automatic rollback...

        - name: Execute rollback for Juniper
          include_tasks: roles/config_rollback/tasks/rollback_junos.yml
          when: rollback_available | default(false)

        - name: Fail after rollback attempt
          fail:
            msg: |
              Configuration deployment failed for {{ inventory_hostname }}.
              {% if rollback_available | default(false) %}
              Rollback completed. Device restored to previous state.
              {% else %}
              Rollback not available. Manual recovery may be required.
              {% endif %}
      when: normalized_os == 'junos'

# Example usage:
# Deploy all devices:
#   ansible-playbook -i inventory.yml site.yml
#
# Deploy only SR Linux devices:
#   ansible-playbook -i inventory.yml site.yml --limit srlinux_devices
#
# Deploy only interfaces:
#   ansible-playbook -i inventory.yml site.yml --tags interfaces
#
# Deploy specific device:
#   ansible-playbook -i inventory.yml site.yml --limit spine1
#
# Use with dynamic inventory:
#   ansible-playbook -i plugins/inventory/dynamic_inventory.py site.yml

