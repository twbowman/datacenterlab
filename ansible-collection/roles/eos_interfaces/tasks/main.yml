---
# tasks file for eos_interfaces
# Arista EOS interface configuration using arista.eos collection

- name: Configure loopback interface (leafs only)
  arista.eos.eos_interfaces:
    config:
      - name: Loopback0
        description: "Router ID and BGP loopback"
        enabled: true
    state: merged
  when: loopback_ip is defined

- name: Configure loopback IP address (leafs only)
  arista.eos.eos_l3_interfaces:
    config:
      - name: Loopback0
        ipv4:
          - address: "{{ loopback_ip }}"
    state: merged
  when: loopback_ip is defined

- name: Configure physical interfaces
  arista.eos.eos_interfaces:
    config:
      - name: "{{ item.name | to_arista_interface }}"
        description: "{{ item.description | default('') }}"
        enabled: true
    state: merged
  loop: "{{ interfaces }}"
  when: item.ip is defined or item.description is defined

- name: Configure interface IP addresses
  arista.eos.eos_l3_interfaces:
    config:
      - name: "{{ item.name | to_arista_interface }}"
        ipv4:
          - address: "{{ item.ip }}"
    state: merged
  loop: "{{ interfaces }}"
  when: item.ip is defined

- name: Display interface configuration results
  ansible.builtin.debug:
    msg: "Interfaces configured on {{ inventory_hostname }} using Arista EOS modules"
  when: eos_interfaces_debug | default(false)
