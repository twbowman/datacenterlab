---
# tasks file for eos_ospf
# Arista EOS OSPF configuration using arista.eos collection

- name: Configure OSPF process
  arista.eos.eos_ospfv2:
    config:
      processes:
        - process_id: 1
          router_id: "{{ router_id }}"
          areas:
            - area_id: "0.0.0.0"
    state: merged

- name: Configure OSPF on physical interfaces
  arista.eos.eos_ospf_interfaces:
    config:
      - name: "{{ item.name | to_arista_interface }}"
        address_family:
          - afi: "ipv4"
            processes:
              - process_id: 1
                area:
                  area_id: "0.0.0.0"
            network: "point-to-point"
    state: merged
  loop: "{{ interfaces }}"
  when: item.ip is defined

- name: Configure OSPF on loopback (passive, leafs only)
  arista.eos.eos_ospf_interfaces:
    config:
      - name: "Loopback0"
        address_family:
          - afi: "ipv4"
            processes:
              - process_id: 1
                area:
                  area_id: "0.0.0.0"
            passive: true
    state: merged
  when: loopback_ip is defined

- name: Display OSPF configuration results
  ansible.builtin.debug:
    msg: "OSPF configured on {{ inventory_hostname }} using Arista EOS modules"
  when: eos_ospf_debug | default(false)
