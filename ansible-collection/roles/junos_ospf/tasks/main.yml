---
# tasks file for junos_ospf
# Juniper Junos OSPF configuration using junipernetworks.junos collection

- name: Configure OSPF process
  junipernetworks.junos.junos_ospfv2:
    config:
      processes:
        - process_id: 1
          router_id: "{{ router_id }}"
          areas:
            - area_id: "0.0.0.0"
    state: merged

- name: Configure OSPF on physical interfaces
  junipernetworks.junos.junos_ospf_interfaces:
    config:
      - name: "{{ item.name | to_junos_interface }}"
        address_family:
          - afi: "ipv4"
            processes:
              - process_id: 1
                area:
                  area_id: "0.0.0.0"
            interface_type: "p2p"
    state: merged
  loop: "{{ interfaces }}"
  when: item.ip is defined

- name: Configure OSPF on loopback (passive, leafs only)
  junipernetworks.junos.junos_ospf_interfaces:
    config:
      - name: lo0
        address_family:
          - afi: "ipv4"
            processes:
              - process_id: 1
                area:
                  area_id: "0.0.0.0"
            passive: true
    state: merged
  when: loopback_ip is defined

- name: Display OSPF configuration results
  ansible.builtin.debug:
    msg: "OSPF configured on {{ inventory_hostname }} using Juniper Junos modules"
  when: junos_ospf_debug | default(false)
