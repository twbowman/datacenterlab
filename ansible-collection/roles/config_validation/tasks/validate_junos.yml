---
# Juniper configuration validation

- name: Validate required Juniper variables
  assert:
    that:
      - ansible_host is defined
      - ansible_user is defined
      - ansible_password is defined
    fail_msg: |
      Missing required Juniper connection variables for {{ inventory_hostname }}.
      Required: ansible_host, ansible_user, ansible_password
    success_msg: "Juniper connection variables validated"

- name: Validate interface configuration syntax
  assert:
    that:
      - item.name is defined
      - item.name is match('^ethernet-[0-9]+/[0-9]+$|^[gx]e-[0-9]+/[0-9]+/[0-9]+$|^lo[0-9]+$')
    fail_msg: |
      Invalid Juniper interface name: {{ item.name | default('undefined') }}
      Expected format: ge-0/0/0, xe-0/0/0, ethernet-1/1 (will be translated), or lo0
    success_msg: "Interface {{ item.name }} name is valid"
  loop: "{{ interfaces | default([]) }}"
  when: interfaces is defined

- name: Validate IPv4 address syntax
  assert:
    that:
      - item.ip is defined
      - item.ip is match('^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/[0-9]{1,2}$')
    fail_msg: |
      Invalid IPv4 address format for interface {{ item.name }}: {{ item.ip | default('undefined') }}
      Expected format: X.X.X.X/Y (CIDR notation)
    success_msg: "IPv4 address {{ item.ip }} is valid"
  loop: "{{ interfaces | default([]) }}"
  when:
    - interfaces is defined
    - item.ip is defined

- name: Validate BGP configuration syntax
  assert:
    that:
      - asn is defined
      - asn is number
      - asn >= 1
      - asn <= 4294967295
      - router_id is defined
      - router_id is match('^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$')
    fail_msg: |
      Invalid BGP configuration for {{ inventory_hostname }}:
      - ASN must be a number between 1 and 4294967295
      - Router ID must be in IPv4 format (X.X.X.X)
      Current values: asn={{ asn | default('undefined') }}, router_id={{ router_id | default('undefined') }}
    success_msg: "BGP configuration validated"
  when: asn is defined or router_id is defined

- name: Validate BGP neighbor syntax
  assert:
    that:
      - item.ip is defined
      - item.ip is match('^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$')
      - item.peer_as is defined
      - item.peer_as is number
      - item.peer_as >= 1
      - item.peer_as <= 4294967295
    fail_msg: |
      Invalid BGP neighbor configuration:
      - Neighbor IP must be in IPv4 format (X.X.X.X)
      - Peer AS must be a number between 1 and 4294967295
      Neighbor: {{ item | default('undefined') }}
    success_msg: "BGP neighbor {{ item.ip }} validated"
  loop: "{{ bgp_neighbors | default([]) }}"
  when: bgp_neighbors is defined

- name: Juniper configuration validation passed
  debug:
    msg: "✓ All Juniper configuration syntax checks passed for {{ inventory_hostname }}"

