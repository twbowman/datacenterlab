---
# tasks file for sonic_ospf
# SONiC OSPF configuration using dellemc.enterprise_sonic collection

- name: Configure OSPF router
  dellemc.enterprise_sonic.sonic_ospfv2:
    config:
      - vrf_name: default
        router_id: "{{ router_id }}"
    state: merged

- name: Configure OSPF on physical interfaces
  dellemc.enterprise_sonic.sonic_ospfv2_interface:
    config:
      - name: "{{ item.name | to_sonic_interface }}"
        ospf_attributes:
          - area_id: "0.0.0.0"
            network: point-to-point
    state: merged
  loop: "{{ interfaces }}"
  when: item.ip is defined

- name: Configure OSPF on loopback (passive, leafs only)
  dellemc.enterprise_sonic.sonic_ospfv2_interface:
    config:
      - name: Loopback0
        ospf_attributes:
          - area_id: "0.0.0.0"
            passive: true
    state: merged
  when: loopback_ip is defined

- name: Display OSPF configuration results
  ansible.builtin.debug:
    msg: "OSPF configured on {{ inventory_hostname }} using SONiC modules"
  when: sonic_ospf_debug | default(false)
